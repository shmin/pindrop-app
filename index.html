<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PinDrop</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=21aa6a962aa0c145f9458ab6704219e5&libraries=services"></script>
<style>
  :root {
    --accent:#ff4d6d; --accent2:#ffd166; --accent3:#06d6a0;
    --card:#1a1a26; --border:#2a2a3a; --surface:#12121a;
    --text:#f0f0f5; --muted:#8888aa; --bg:#0a0a0f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;position:relative;}

/* ── Full screen map ── */
#kakao-map{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* ── Top bar ── */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 14px 8px;display:flex;flex-direction:column;gap:8px;background:linear-gradient(to bottom,rgba(10,10,15,0.92) 70%,transparent);}
.top-row{display:flex;align-items:center;gap:10px;}
.logo{font-family:‘Gmarket Sans’,sans-serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(–accent),var(–accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0;}
.search-bar{flex:1;display:flex;align-items:center;gap:8px;background:rgba(26,26,38,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:9px 16px;backdrop-filter:blur(12px);}
.search-bar input{flex:1;background:none;border:none;color:var(–text);font-family:‘Noto Sans KR’,sans-serif;font-size:14px;outline:none;}
.search-bar input::placeholder{color:var(–muted);}
.search-icon{color:var(–muted);font-size:15px;flex-shrink:0;}
.auth-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:rgba(26,26,38,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:6px 12px;cursor:pointer;backdrop-filter:blur(12px);}
.auth-chip img{width:22px;height:22px;border-radius:50%;object-fit:cover;}
.auth-chip span{font-size:12px;color:var(–text);white-space:nowrap;}

/* Category chips */
.cat-chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.cat-chips::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid rgba(255,255,255,0.1);background:rgba(18,18,26,0.9);color:var(–muted);cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px;}
.cat-chip.active{color:#fff;border-color:transparent;}
.cat-chip[data-cat=“전체”].active{background:rgba(255,77,109,0.85);}
.cat-chip[data-cat=“팝업”].active{background:#ff4d6d;}
.cat-chip[data-cat=“세일”].active{background:#e6a800;color:#fff;}
.cat-chip[data-cat=“공연”].active{background:#06d6a0;}
.cat-chip[data-cat=“전시”].active{background:#7c6ff7;}
.cat-chip[data-cat=“기타”].active{background:#3a9bd5;}

/* ── FAB ── */
.fab{position:fixed;right:18px;bottom:200px;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(–accent),#ff6b35);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(255,77,109,0.5);display:flex;align-items:center;justify-content:center;transition:transform 0.15s;}
.fab:active{transform:scale(0.93);}

/* ── Bottom sheet ── */
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:150;padding:0 0 env(safe-area-inset-bottom);}
.sheet-handle{height:22px;display:flex;align-items:center;justify-content:center;}
.sheet-handle-bar{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);}
.sheet-header{padding:0 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-size:12px;font-weight:700;color:var(–muted);letter-spacing:1px;text-transform:uppercase;}
.sheet-count{background:var(–accent);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.cards-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px 16px;scrollbar-width:none;}
.cards-scroll::-webkit-scrollbar{display:none;}

/* Event card */
.ev-card{flex-shrink:0;width:220px;background:rgba(20,20,32,0.97);border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:14px;cursor:pointer;transition:transform 0.15s;backdrop-filter:blur(16px);position:relative;overflow:hidden;}
.ev-card::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px;}
.ev-card[data-cat=“팝업”]::before{background:#ff4d6d;}.ev-card[data-cat=“세일”]::before{background:#ffd166;}
.ev-card[data-cat=“공연”]::before{background:#06d6a0;}.ev-card[data-cat=“전시”]::before{background:#a29bfe;}.ev-card[data-cat=“기타”]::before{background:#74b9ff;}
.ev-card:active{transform:scale(0.97);}
.ev-card.selected{border-color:var(–accent);box-shadow:0 0 0 1px var(–accent);}
.ev-card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ev-icon{font-size:28px;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ev-info{flex:1;min-width:0;}
.ev-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.ev-loc{font-size:11px;color:var(–muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-footer{display:flex;align-items:center;justify-content:space-between;}
.ev-cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;}
.ev-cat.팝업{background:rgba(255,77,109,0.2);color:#ff4d6d;}.ev-cat.세일{background:rgba(255,209,102,0.2);color:#ffd166;}
.ev-cat.공연{background:rgba(6,214,160,0.2);color:#06d6a0;}.ev-cat.전시{background:rgba(162,155,254,0.2);color:#a29bfe;}.ev-cat.기타{background:rgba(116,185,255,0.2);color:#74b9ff;}
.ev-time{font-size:10px;color:var(–muted);}
.ev-time.urgent{color:var(–accent);font-weight:700;}
.mine-dot{position:absolute;top:10px;right:10px;width:6px;height:6px;border-radius:50%;background:var(–accent2);}
.no-events{padding:20px;color:var(–muted);font-size:13px;text-align:center;white-space:nowrap;}

/* ── Info popup (map overlay) ── */
.info-popup{position:fixed;left:50%;transform:translateX(-50%);bottom:220px;z-index:160;background:rgba(20,20,32,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:16px;width:calc(100% - 32px);max-width:400px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.6);display:none;}
.info-popup.show{display:block;animation:slideUp 0.2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.info-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.info-icon{font-size:36px;width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.info-main{flex:1;min-width:0;}
.info-cat{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;margin-bottom:4px;}
.info-title{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.3;}
.info-desc{font-size:12px;color:var(–muted);line-height:1.5;}
.info-close{background:rgba(255,255,255,0.08);border:none;color:var(–muted);width:28px;height:28px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.info-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);}
.info-meta{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(–muted);}
.info-del{padding:7px 16px;border-radius:10px;border:1px solid rgba(255,77,109,0.3);background:transparent;color:var(–accent);font-family:‘Noto Sans KR’,sans-serif;font-size:12px;cursor:pointer;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#14141f;border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:90dvh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal::-webkit-scrollbar{display:none;}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 16px;}
.modal-title{font-family:‘Gmarket Sans’,sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,var(–accent),var(–accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.form-group{margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
label{display:block;font-size:10px;font-weight:700;color:var(–muted);margin-bottom:5px;letter-spacing:0.8px;text-transform:uppercase;}
input,textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:11px 14px;color:var(–text);font-family:‘Noto Sans KR’,sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
input:focus,textarea:focus{border-color:var(–accent);}
textarea{resize:none;height:60px;}
.cat-select{display:flex;gap:6px;flex-wrap:wrap;}
.cat-opt{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:var(–muted);cursor:pointer;transition:all 0.15s;}
.cat-opt.sel{border-color:var(–accent);color:var(–accent);background:rgba(255,77,109,0.12);}
.section-title{font-size:10px;font-weight:700;color:var(–accent);letter-spacing:1px;text-transform:uppercase;margin:14px 0 10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:’’;flex:1;height:1px;background:rgba(255,255,255,0.06);}
.section-block{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:12px;}
.pin-style-tabs{display:flex;gap:8px;margin-bottom:12px;}
.pst{flex:1;padding:10px 6px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(–muted);font-family:‘Noto Sans KR’,sans-serif;font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;}
.pst.active{border-color:var(–accent);color:var(–text);background:rgba(255,77,109,0.1);}
.pst-icon{font-size:20px;margin-bottom:4px;display:block;}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;}
.icon-opt{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.icon-opt:active,.icon-opt.sel{border-color:var(–accent);background:rgba(255,77,109,0.15);transform:scale(1.1);}
.loc-preview{background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.25);border-radius:10px;padding:8px 12px;font-size:12px;color:var(–accent3);margin-bottom:10px;display:none;}
.loc-preview.show{display:block;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;padding:13px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:var(–muted);font-family:‘Noto Sans KR’,sans-serif;font-size:14px;cursor:pointer;}
.btn-submit{flex:2;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,var(–accent),#ff6b35);color:#fff;font-family:‘Noto Sans KR’,sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-submit:disabled{opacity:0.5;}
.hint{font-size:11px;color:var(–muted);margin-top:6px;}

/* ── Login screen ── */
.login-screen{position:fixed;inset:0;background:var(–bg);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
.login-screen.hidden{display:none;}
.login-logo{font-family:‘Gmarket Sans’,sans-serif;font-size:48px;font-weight:700;background:linear-gradient(135deg,var(–accent),var(–accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.login-sub{font-size:15px;color:var(–muted);text-align:center;line-height:1.7;margin-bottom:48px;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;max-width:300px;padding:15px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(–text);font-family:‘Noto Sans KR’,sans-serif;font-size:15px;font-weight:500;cursor:pointer;}
.google-icon{width:22px;height:22px;flex-shrink:0;}

/* ── Loading ── */
.loading{position:fixed;inset:0;background:var(–bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading.hidden{display:none;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(–accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(–muted);}

/* ── Toast ── */
.toast{position:fixed;top:100px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(20,20,32,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(12px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(–accent3);color:var(–accent3);}
.toast.error{border-color:var(–accent);color:var(–accent);}

/* Kakao custom marker */
.k-marker{display:flex;flex-direction:column;align-items:center;cursor:pointer;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));}
.k-pin{width:42px;height:52px;border-radius:50% 50% 50% 0;display:flex;align-items:center;justify-content:center;transform:rotate(-45deg);transition:transform 0.15s;}
.k-pin:active{transform:rotate(-45deg) scale(1.15);}
.k-emoji{transform:rotate(45deg);font-size:20px;}
.k-badge{padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;font-family:‘Noto Sans KR’,sans-serif;max-width:100px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
.k-label{background:rgba(10,10,20,0.85);color:#e0e0f0;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:‘Noto Sans KR’,sans-serif;margin-top:2px;max-width:90px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;border:1px solid rgba(255,255,255,0.08);}
.k-urgent{width:8px;height:8px;border-radius:50%;margin:2px auto 0;animation:pgreen 1s infinite;}
@keyframes pgreen{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Realtime indicator */
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(–accent3);box-shadow:0 0 6px var(–accent3);animation:pgreen 2s infinite;flex-shrink:0;}
</style>

</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTMAi2EZSx1fhY794NyKS3XtlCfOsLnn0",
  authDomain: "pindrop-app-fcb28.firebaseapp.com",
  projectId: "pindrop-app-fcb28",
  storageBucket: "pindrop-app-fcb28.firebasestorage.app",
  messagingSenderId: "421838566039",
  appId: "1:421838566039:web:d053d9ae72fb29e16dafd2"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const CAT_COLORS = {'팝업':'#ff4d6d','세일':'#ffd166','공연':'#06d6a0','전시':'#a29bfe','기타':'#74b9ff'};
const ICONS = ['🎉','🛍️','🎵','🎨','🍔','🍰','☕','🌸','💄','👗','🎭','📸','🏪','🎤','🎪','🌟','🔥','💥','🎯','🎲','🏋️','🌈','🎀','🦋','🍺','🍜','🎸','🎹','🎬','🌙','✨','🏆'];
let events=[], currentUser=null, activeFilter='전체';
let pendingLat=null, pendingLng=null, openInfoId=null;
let selectedPinStyle='icon', selectedIcon='🎉', selectedCat='팝업';
let kakaoMap=null, markers={};

// Toast
function toast(msg, type='success') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Kakao map init
function initMap() {
  kakaoMap = new kakao.maps.Map(document.getElementById('kakao-map'), {
    center: new kakao.maps.LatLng(37.5665,126.9780), level:7
  });
  kakaoMap.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  kakao.maps.event.addListener(kakaoMap,'click', e => {
    if (!currentUser) { toast('먼저 로그인해주세요! 🔐','error'); return; }
    closeInfo();
    pendingLat=e.latLng.getLat(); pendingLng=e.latLng.getLng();
    const gc=new kakao.maps.services.Geocoder();
    gc.coord2Address(pendingLng,pendingLat,(res,status)=>{
      if(status===kakao.maps.services.Status.OK&&res[0]){
        const addr=res[0].road_address?res[0].road_address.address_name:res[0].address.address_name;
        document.getElementById('f-loc').value=addr;
        document.getElementById('loc-preview').textContent='📍 '+addr;
      } else {
        document.getElementById('loc-preview').textContent=`📍 ${pendingLat.toFixed(5)}, ${pendingLng.toFixed(5)}`;
      }
      document.getElementById('loc-preview').classList.add('show');
    });
    openModal();
  });
  document.getElementById('loading').classList.add('hidden');
}

let kakaoRetry=0;
function tryInitMap() {
  if(typeof kakao!=='undefined'&&kakao.maps) { kakao.maps.load(initMap); }
  else if(kakaoRetry++<40) { setTimeout(tryInitMap,300); }
  else { document.getElementById('loading').classList.add('hidden'); toast('카카오맵 로드 실패','error'); }
}
tryInitMap();

// Auth
const provider=new GoogleAuthProvider();
const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
getRedirectResult(auth).catch(()=>{});

async function doLogin() {
  try {
    if(isMobile) await signInWithRedirect(auth,provider);
    else await signInWithPopup(auth,provider);
  } catch(e) { toast('로그인 실패: '+e.message,'error'); }
}
document.getElementById('google-login-btn').addEventListener('click',doLogin);
document.getElementById('auth-chip').addEventListener('click',async()=>{
  if(currentUser){if(confirm('로그아웃 하시겠어요?'))await signOut(auth);}
  else doLogin();
});

onAuthStateChanged(auth,user=>{
  currentUser=user;
  const chip=document.getElementById('auth-chip');
  const loginScreen=document.getElementById('login-screen');
  if(user){
    loginScreen.classList.add('hidden');
    chip.innerHTML=`<img src="${user.photoURL||''}" onerror="this.style.display='none'"/><span>${(user.displayName||'').split(' ')[0]}</span>`;
    toast(`${user.displayName||'사용자'}님 환영해요! 🎉`);
  } else {
    loginScreen.classList.remove('hidden');
    chip.innerHTML='<span>로그인</span>';
  }
});

// Firestore
const q=query(collection(db,'events'),orderBy('createdAt','desc'));
onSnapshot(q,snap=>{
  const now=Date.now();
  events=snap.docs.map(d=>({id:d.id,...d.data()}))
    .filter(ev=>{
      const t=ev.expiry?.toDate?ev.expiry.toDate().getTime():new Date(ev.expiry).getTime();
      return t>now;
    });
  renderMarkers(); renderCards();
},err=>toast('DB 오류: '+err.message,'error'));

// Helpers
function timeLeft(expiry){
  const t=expiry?.toDate?expiry.toDate():new Date(expiry);
  const diff=t-Date.now();
  if(diff<=0) return{text:'만료됨',urgent:true,expired:true};
  const h=Math.floor(diff/36e5),d=Math.floor(h/24);
  if(d>0) return{text:`${d}일 ${h%24}시간`,urgent:d<=1,expired:false};
  return{text:`${h}시간 남음`,urgent:true,expired:false};
}
function filtered(){ return events.filter(e=>activeFilter==='전체'||e.cat===activeFilter); }

// Markers
function makeMarkerHTML(ev){
  const color=CAT_COLORS[ev.cat]||'#aaa';
  const tl=timeLeft(ev.expiry);
  const label=(ev.label||ev.title||'').slice(0,10);
  if(ev.pinStyle==='text-only'){
    return `<div class="k-marker"><div class="k-badge" style="background:${color}">${label}</div>${tl.urgent?`<div class="k-urgent" style="background:${color}"></div>`:''}</div>`;
  }
  return `<div class="k-marker"><div class="k-pin" style="background:${color}"><span class="k-emoji">${ev.icon||'📍'}</span></div><div class="k-label">${label}</div>${tl.urgent?`<div class="k-urgent" style="background:${color}"></div>`:''}</div>`;
}

function renderMarkers(){
  if(!kakaoMap) return;
  const vis=filtered();
  const visIds=new Set(vis.map(e=>e.id));
  Object.keys(markers).forEach(id=>{
    if(!visIds.has(id)){markers[id].overlay.setMap(null);delete markers[id];}
  });
  vis.forEach(ev=>{
    if(!ev.lat||!ev.lng) return;
    const pos=new kakao.maps.LatLng(ev.lat,ev.lng);
    if(markers[ev.id]){
      // Update content
      const el=markers[ev.id].overlay.getContent();
      if(el&&el.outerHTML!==undefined) markers[ev.id].overlay.setContent(makeMarkerHTML(ev));
      return;
    }
    const overlay=new kakao.maps.CustomOverlay({position:pos,content:makeMarkerHTML(ev),yAnchor:1,zIndex:3});
    overlay.setMap(kakaoMap);
    markers[ev.id]={overlay};
    // Click binding (retry until DOM ready)
    let tries=0;
    const bind=setInterval(()=>{
      const el=document.querySelector(`.k-marker`);
      // bind by finding overlay node
      const node=overlay.getContent();
      if(node&&node.addEventListener){
        node.addEventListener('click',()=>showInfo(ev.id));
        clearInterval(bind);
      } else if(++tries>20) clearInterval(bind);
    },150);
  });
}

// Info popup
function showInfo(id){
  const ev=events.find(e=>e.id===id); if(!ev) return;
  openInfoId=id;
  const color=CAT_COLORS[ev.cat]||'#aaa';
  const tl=timeLeft(ev.expiry);
  document.getElementById('info-icon').textContent=ev.icon||'📍';
  document.getElementById('info-icon').style.background=color+'22';
  const catEl=document.getElementById('info-cat');
  catEl.textContent=ev.cat; catEl.style.background=color+'22'; catEl.style.color=color;
  document.getElementById('info-title').textContent=ev.title;
  document.getElementById('info-desc').textContent=ev.desc||'';
  document.getElementById('info-meta').innerHTML=
    `<span>⏰ <span style="color:${tl.urgent?'#ff4d6d':color}">${tl.text}</span></span>
     <span style="color:var(--muted)">📍 ${ev.loc||''}</span>
     <span style="color:var(--muted)">👤 ${ev.authorName||'익명'}</span>`;
  const delBtn=document.getElementById('info-del');
  if(currentUser&&ev.authorUid===currentUser.uid){
    delBtn.style.display='block';
    delBtn.onclick=()=>deletePin(ev);
  } else delBtn.style.display='none';
  document.getElementById('info-popup').classList.add('show');
  if(ev.lat&&ev.lng) kakaoMap.panTo(new kakao.maps.LatLng(ev.lat,ev.lng));
  renderCards();
}
function closeInfo(){
  openInfoId=null;
  document.getElementById('info-popup').classList.remove('show');
  renderCards();
}
document.getElementById('info-close').addEventListener('click',closeInfo);

async function deletePin(ev){
  if(!confirm(`"${ev.title}" 핀을 삭제할까요?`)) return;
  try{
    await deleteDoc(doc(db,'events',ev.id));
    if(markers[ev.id]){markers[ev.id].overlay.setMap(null);delete markers[ev.id];}
    closeInfo(); toast('핀이 삭제됐어요 🗑');
  }catch(e){toast('삭제 실패: '+e.message,'error');}
}

// Cards
function renderCards(){
  const scroll=document.getElementById('cards-scroll');
  const vis=filtered();
  document.getElementById('sheet-count').textContent=vis.length;
  if(!vis.length){
    scroll.innerHTML=`<div class="no-events">이 카테고리에 이벤트가 없어요 — 지도를 클릭해 추가해보세요!</div>`;
    return;
  }
  scroll.innerHTML='';
  [...vis].sort((a,b)=>{
    const ta=a.expiry?.toDate?a.expiry.toDate():new Date(a.expiry);
    const tb=b.expiry?.toDate?b.expiry.toDate():new Date(b.expiry);
    return ta-tb;
  }).forEach(ev=>{
    const tl=timeLeft(ev.expiry);
    const isMe=currentUser&&ev.authorUid===currentUser.uid;
    const color=CAT_COLORS[ev.cat]||'#aaa';
    const card=document.createElement('div');
    card.className='ev-card'+(openInfoId===ev.id?' selected':'');
    card.setAttribute('data-cat',ev.cat);
    card.innerHTML=`
      ${isMe?'<div class="mine-dot"></div>':''}
      <div class="ev-card-top">
        <div class="ev-icon" style="background:${color}22">${ev.icon||'📍'}</div>
        <div class="ev-info">
          <div class="ev-title">${ev.title}</div>
          <div class="ev-loc">📍 ${ev.loc||''}</div>
        </div>
      </div>
      <div class="ev-footer">
        <span class="ev-cat ${ev.cat}">${ev.cat}</span>
        <span class="ev-time ${tl.urgent?'urgent':''}">${tl.text}</span>
      </div>`;
    card.addEventListener('click',()=>{
      if(ev.lat&&ev.lng){kakaoMap.setLevel(4);showInfo(ev.id);}
    });
    scroll.appendChild(card);
  });
}

// Category filter
document.getElementById('cat-chips').addEventListener('click',e=>{
  const chip=e.target.closest('.cat-chip'); if(!chip) return;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active'); activeFilter=chip.getAttribute('data-cat');
  closeInfo(); renderMarkers(); renderCards();
});

// FAB
document.getElementById('fab').addEventListener('click',()=>{
  if(!currentUser){toast('먼저 로그인해주세요! 🔐','error');return;}
  const center=kakaoMap?kakaoMap.getCenter():null;
  if(center){pendingLat=center.getLat();pendingLng=center.getLng();}
  document.getElementById('loc-preview').textContent='📍 지도 중심 위치';
  document.getElementById('loc-preview').classList.add('show');
  openModal();
});

function openModal(){
  const d=new Date(Date.now()+3*864e5);
  document.getElementById('f-expiry').value=new Date(d-d.getTimezoneOffset()*6e4).toISOString().slice(0,16);
  document.getElementById('modal').classList.add('open');
}
document.getElementById('modal-cancel').addEventListener('click',()=>{
  document.getElementById('modal').classList.remove('open');
  document.getElementById('loc-preview').classList.remove('show');
});

// Pin style
document.getElementById('pin-style-tabs').addEventListener('click',e=>{
  const tab=e.target.closest('.pst'); if(!tab) return;
  document.querySelectorAll('.pst').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active'); selectedPinStyle=tab.getAttribute('data-style');
  document.getElementById('panel-icon').style.display=selectedPinStyle==='icon'?'':'none';
  document.getElementById('panel-text-only').style.display=selectedPinStyle==='text-only'?'':'none';
});

document.getElementById('cat-select').addEventListener('click',e=>{
  const opt=e.target.closest('.cat-opt'); if(!opt) return;
  document.querySelectorAll('.cat-opt').forEach(o=>o.classList.remove('sel'));
  opt.classList.add('sel'); selectedCat=opt.getAttribute('data-v');
});

// Icon grid
const iconGrid=document.getElementById('icon-grid');
ICONS.forEach(ic=>{
  const d=document.createElement('div');
  d.className='icon-opt'+(ic===selectedIcon?' sel':'');
  d.textContent=ic;
  d.addEventListener('click',()=>{
    document.querySelectorAll('.icon-opt').forEach(o=>o.classList.remove('sel'));
    d.classList.add('sel'); selectedIcon=ic;
  });
  iconGrid.appendChild(d);
});

// Submit
document.getElementById('modal-submit').addEventListener('click',async()=>{
  if(!currentUser){toast('로그인이 필요해요','error');return;}
  if(!pendingLat||!pendingLng){toast('지도를 먼저 클릭해주세요','error');return;}
  const title=document.getElementById('f-title').value.trim();
  const expiry=document.getElementById('f-expiry').value;
  if(!title||!expiry){toast('이름과 유효기간을 입력해주세요','error');return;}
  const btn=document.getElementById('modal-submit');
  btn.disabled=true; btn.textContent='저장 중...';
  try{
    await addDoc(collection(db,'events'),{
      title, cat:selectedCat,
      loc:document.getElementById('f-loc').value.trim()||'위치 미정',
      desc:document.getElementById('f-desc').value.trim()||'',
      expiry:new Date(expiry),
      lat:pendingLat, lng:pendingLng,
      pinStyle:selectedPinStyle,
      icon:selectedPinStyle==='icon'?selectedIcon:'',
      label:title,
      authorUid:currentUser.uid,
      authorName:currentUser.displayName||currentUser.email,
      createdAt:serverTimestamp(),
    });
    document.getElementById('modal').classList.remove('open');
    document.getElementById('loc-preview').classList.remove('show');
    ['f-title','f-loc','f-desc'].forEach(id=>document.getElementById(id).value='');
    toast('핀이 등록됐어요! 🎉');
  }catch(e){toast('저장 실패: '+e.message,'error');}
  finally{btn.disabled=false;btn.textContent='핀 꽂기 📌';}
});

setInterval(()=>{renderCards();},60000);
</script>
