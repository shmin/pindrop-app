<!doctype html>

<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>iPod × Local Excel</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #d9d5cc;
    --body-edge: #c9c4b8;
    --screen: #cfd7c7;
    --screen-2: #b9c3ac;
    --wheel-edge: #b9b4a8;
    --bar: linear-gradient(180deg, #4a77c9, #2e55a8);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(1000px 700px at 50% 20%, #e7e3d8 0%, transparent 60%),
      var(--bg);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    display: grid; place-items: center;
    overflow: hidden; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .ipod {
    width: min(92vmin, 360px);
    aspect-ratio: 360 / 620;
    background: linear-gradient(180deg, #fbf9f4 0%, #eae6dc 100%);
    border-radius: 34px;
    padding: 22px 22px 28px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.9),
      inset 0 -2px 0 rgba(0,0,0,.06),
      0 30px 60px rgba(30,30,30,.25),
      0 0 0 1px var(--body-edge);
    display: flex; flex-direction: column;
  }
  .screen {
    aspect-ratio: 4/3;
    border-radius: 6px;
    background: linear-gradient(180deg, var(--screen) 0%, var(--screen-2) 100%);
    box-shadow:
      inset 0 2px 6px rgba(0,0,0,.25),
      inset 0 -1px 0 rgba(255,255,255,.3),
      0 0 0 6px #1a1a1a, 0 0 0 7px #3a3a3a;
    overflow: hidden; position: relative;
  }
  .titlebar {
    height: 22px; background: var(--bar); color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px; font-size: 12px; font-weight: 700; position: relative;
  }
  .titlebar::before {
    content: ""; position: absolute; inset: 0 0 auto 0; height: 45%;
    background: linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0));
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ff9d5a; box-shadow: 0 0 6px rgba(255,200,120,.7);
  }
  .dot.clean { background: #a0e878; box-shadow: 0 0 6px rgba(160,230,120,.6); }

.list { position: absolute; top: 22px; bottom: 0; left: 0; right: 0; overflow: hidden; }
.list ul { list-style: none; margin: 0; padding: 0; transition: transform .18s cubic-bezier(.2,.8,.2,1); }
.list li {
padding: 4px 8px;
font-size: 13px; line-height: 1.2;
border-bottom: 1px solid rgba(0,0,0,.06);
display: flex; align-items: center; gap: 8px;
min-height: 36px;
}
.list li .thumb {
width: 28px; height: 28px; border-radius: 4px;
background: rgba(0,0,0,.08) center/cover no-repeat;
flex-shrink: 0;
border: 1px solid rgba(0,0,0,.12);
}
.list li .label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list li .meta { color: #555; font-size: 13px; font-variant-numeric: tabular-nums; font-weight: 600; }
.list li .chev { color: #555; font-size: 12px; }
.list li.active { background: var(–bar); color: #fff; }
.list li.active .meta, .list li.active .chev { color: #fff; }
.list li.active .thumb { border-color: rgba(255,255,255,.4); }

.preview {
position: absolute; inset: 22px 0 0 0;
background: #000;
display: none;
align-items: center; justify-content: center;
flex-direction: column; gap: 8px; padding: 12px;
}
.preview.show { display: flex; }
.preview img { max-width: 100%; max-height: 65%; object-fit: contain; border-radius: 4px; }
.preview .pLabel { color: #fff; font-size: 14px; font-weight: 600; text-align: center; }
.preview .pCount { color: #ccc; font-size: 12px; font-variant-numeric: tabular-nums; }
.preview input[type=file] { display: none; }
.preview label.upload {
font-size: 10px; color: #bbb; border: 1px dashed #555;
padding: 4px 10px; border-radius: 4px; cursor: pointer;
}

.empty { padding: 16px 14px; font-size: 12px; color: #333; text-align: center; line-height: 1.5; }
.empty .big { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.empty button, .empty label.btn {
display: inline-block;
margin: 6px 3px 0;
background: #2e55a8; color: #fff; border: none;
padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
}
.empty label.btn.ghost { background: transparent; color: #2e55a8; border: 1px solid #2e55a8; }
.empty label.btn.danger { background: transparent; color: #c44; border: 1px solid #c44; font-size: 10px; }
.empty input[type=file] { display: none; }

.dlmodal {
position: absolute; inset: 22px 0 0 0;
background: rgba(0,0,0,.9);
display: none;
align-items: center; justify-content: center;
flex-direction: column; gap: 10px; padding: 16px;
z-index: 10;
}
.dlmodal.show { display: flex; }
.dlmodal p { color: #fff; font-size: 12px; text-align: center; margin: 0; line-height: 1.5; }
.dlmodal a.dlbtn {
background: #2e55a8; color: #fff; padding: 8px 16px; border-radius: 6px;
text-decoration: none; font-size: 13px; font-weight: 600;
}
.dlmodal button {
background: transparent; color: #ccc; border: 1px solid #555;
padding: 4px 12px; border-radius: 4px; font-size: 11px; cursor: pointer;
}

.toast {
position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%);
background: rgba(0,0,0,.75); color: #fff; font-size: 11px;
padding: 4px 10px; border-radius: 10px; opacity: 0; transition: opacity .2s;
pointer-events: none; white-space: nowrap; z-index: 5;
max-width: 80%; text-align: center;
}
.toast.show { opacity: 1; }

.wheel-wrap { margin-top: auto; display: grid; place-items: center; padding-top: 18px; }
.wheel {
width: 82%; aspect-ratio: 1/1; border-radius: 50%;
position: relative;
background: radial-gradient(circle at 50% 40%, #f4f1ea 0%, #dcd8ce 70%, #c9c4b8 100%);
box-shadow:
inset 0 2px 4px rgba(255,255,255,.8),
inset 0 -6px 14px rgba(0,0,0,.12),
0 2px 6px rgba(0,0,0,.15),
0 0 0 1px var(–wheel-edge);
cursor: grab; touch-action: none;
}
.wheel.dragging { cursor: grabbing; }
.tag {
position: absolute; font-weight: 700; color: #4a4a4a;
letter-spacing: .08em; cursor: pointer; font-size: 14px;
}
.tag.menu { top: 8%; left: 50%; transform: translateX(-50%); font-size: 11px; }
.tag.prev { top: 50%; left: 8%;  transform: translateY(-50%); font-size: 18px; }
.tag.next { top: 50%; right: 8%; transform: translateY(-50%); font-size: 18px; }
.tag.play { bottom: 8%; left: 50%; transform: translateX(-50%); font-size: 11px; }
.center-btn {
position: absolute; top: 50%; left: 50%;
width: 38%; height: 38%;
transform: translate(-50%, -50%);
border: none; border-radius: 50%;
background: radial-gradient(circle at 50% 35%, #ffffff 0%, #e8e4da 75%);
box-shadow:
inset 0 1px 0 rgba(255,255,255,.9),
inset 0 -4px 10px rgba(0,0,0,.08),
0 1px 3px rgba(0,0,0,.15),
0 0 0 1px var(–wheel-edge);
cursor: pointer;
}
.center-btn:active { box-shadow: inset 0 2px 4px rgba(0,0,0,.12), 0 0 0 1px var(–wheel-edge); }
</style>

</head>
<body>

<div class="ipod">
  <div class="screen">
    <div class="titlebar">
      <span id="screenTitle">iPod</span>
      <span class="dot clean" id="dirtyDot" title="저장 상태"></span>
    </div>
    <div class="list" id="list">
      <ul id="listUl"></ul>
      <div class="empty" id="emptyView" style="display:none;"></div>
      <div class="preview" id="previewView">
        <img id="previewImg" alt="" />
        <div class="pLabel" id="previewLabel"></div>
        <div class="pCount" id="previewCount"></div>
        <label class="upload">
          이미지 교체
          <input type="file" id="imgPicker" accept="image/*" />
        </label>
      </div>
      <div class="dlmodal" id="dlModal">
        <p id="dlMsg">파일이 준비됐어요.</p>
        <a class="dlbtn" id="dlLink" download>파일 다운로드</a>
        <button onclick="closeDownload()">닫기</button>
      </div>
      <div class="toast" id="toast"></div>
    </div>
  </div>

  <div class="wheel-wrap">
    <div class="wheel" id="wheel">
      <span class="tag menu" id="btnMenu">MENU</span>
      <span class="tag prev" id="btnPrev">−</span>
      <span class="tag next" id="btnNext">+</span>
      <span class="tag play" id="btnPlay">EXPORT</span>
      <button class="center-btn" id="centerBtn" aria-label="Select"></button>
    </div>
  </div>
</div>

<script>
window.addEventListener('error', (e) => {
  console.error('Global error:', e.message);
  toast('에러: ' + (e.message || 'unknown').slice(0, 60));
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('Promise rejection:', e.reason);
  toast('Promise: ' + String(e.reason).slice(0, 60));
});

// 엑셀 셀당 최대 문자 수 (실제 한계 32767보다 살짝 낮게)
const MAX_CELL_CHARS = 32000;

const LS_KEY = 'ipod-wb-v1';
const LS_FILENAME = 'ipod-filename-v1';
let workbook = null;
let fileName = localStorage.getItem(LS_FILENAME) || 'ipod-data.xlsx';
let dirty = false;

const state = {
  view: 'init',
  currentTabIdx: -1,
  cursor: 0,
  preview: false,
};

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

function start() {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) {
    try {
      workbook = JSON.parse(saved);
      dirty = true;
      updateDirty();
      goTabs();
      return;
    } catch (e) {
      console.error('복원 실패:', e);
    }
  }
  showStart();
}

function showStart() {
  state.view = 'init';
  setTitle('iPod');
  const hasBackup = !!localStorage.getItem(LS_KEY);
  renderEmpty(`
    <div class="big">엑셀 파일로 시작</div>
    <div>기존 파일을 열거나 새 파일을 만들어요.</div>
    <label class="btn">
      파일 열기
      <input type="file" id="openFile" accept=".xlsx,.xls" />
    </label>
    <button class="btn ghost" onclick="createNew()">새로 만들기</button>
    ${hasBackup ? '<br><button class="btn danger" onclick="resetAll()">저장된 데이터 삭제</button>' : ''}
  `);
}

async function onFileOpen(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  fileName = file.name;
  localStorage.setItem(LS_FILENAME, fileName);
  try {
    const ab = await file.arrayBuffer();
    workbook = parseWorkbook(ab);
    dirty = false;
    saveLocal();
    updateDirty();
    goTabs();
  } catch (err) {
    console.error(err);
    toast('파일 읽기 실패');
  }
}

function createNew() {
  workbook = {
    tabs: [
      { title: 'Sheet1', rows: [
        { label: '첫 항목', count: 0, image: '' }
      ]}
    ]
  };
  fileName = 'ipod-data.xlsx';
  localStorage.setItem(LS_FILENAME, fileName);
  dirty = true;
  saveLocal();
  updateDirty();
  goTabs();
}

function resetAll() {
  if (!confirm('브라우저에 저장된 모든 데이터를 삭제합니다.\n정말 진행할까요?')) return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_FILENAME);
  workbook = null;
  fileName = 'ipod-data.xlsx';
  dirty = false;
  updateDirty();
  showStart();
}

// ==============================================================
// 엑셀 파싱 — 이미지는 청크로 저장되어 있음
// _images 시트: [tab, label, part, dataChunk]
// 같은 (tab, label) 의 part 순서대로 합쳐야 완전한 dataUrl
// ==============================================================
function parseWorkbook(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array' });
  const tabs = [];
  const imageChunks = {};  // { "tab::label": { part: chunk, ... } }

  if (wb.SheetNames.includes('_images')) {
    const imgSheet = wb.Sheets['_images'];
    const imgRows = XLSX.utils.sheet_to_json(imgSheet, { header: 1 });
    for (let i = 1; i < imgRows.length; i++) {
      const [t, l, p, d] = imgRows[i] || [];
      if (t == null || l == null || d == null) continue;
      const key = `${t}::${l}`;
      if (!imageChunks[key]) imageChunks[key] = {};
      imageChunks[key][Number(p) || 0] = String(d);
    }
  }

  // 청크 합치기
  const imageMap = {};
  Object.keys(imageChunks).forEach(key => {
    const parts = imageChunks[key];
    const indices = Object.keys(parts).map(Number).sort((a, b) => a - b);
    imageMap[key] = indices.map(i => parts[i]).join('');
  });

  wb.SheetNames.forEach(name => {
    if (name === '_images') return;
    const sheet = wb.Sheets[name];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    const data = rows.slice(1)
      .map(r => ({
        label: String(r?.[0] ?? '').trim(),
        count: Number.isFinite(+r?.[1]) ? +r[1] : 0,
      }))
      .filter(r => r.label !== '');
    data.forEach(r => {
      r.image = imageMap[`${name}::${r.label}`] || '';
    });
    tabs.push({ title: name, rows: data });
  });

  if (!tabs.length) tabs.push({ title: 'Sheet1', rows: [] });
  return { tabs };
}

// ==============================================================
// 엑셀 Export — 이미지를 청크로 잘라서 저장
// ==============================================================
function exportWorkbook() {
  if (!workbook) return;
  try {
    toast('Export 중...');
    const wb = XLSX.utils.book_new();

    // 메인 시트들
    workbook.tabs.forEach(tab => {
      const aoa = [['label', 'count'],
        ...tab.rows.map(r => [r.label, r.count])];
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      XLSX.utils.book_append_sheet(wb, ws, tab.title);
    });

    // 이미지 시트 (청크로 분할)
    const imgAoa = [['tab', 'label', 'part', 'dataChunk']];
    workbook.tabs.forEach(tab => {
      tab.rows.forEach(r => {
        if (!r.image) return;
        const img = r.image;
        const chunks = Math.ceil(img.length / MAX_CELL_CHARS);
        for (let i = 0; i < chunks; i++) {
          const chunk = img.slice(i * MAX_CELL_CHARS, (i + 1) * MAX_CELL_CHARS);
          imgAoa.push([tab.title, r.label, i, chunk]);
        }
      });
    });
    const imgWs = XLSX.utils.aoa_to_sheet(imgAoa);
    XLSX.utils.book_append_sheet(wb, imgWs, '_images');

    if (wb.Workbook == null) wb.Workbook = { Sheets: [] };
    wb.Workbook.Sheets = wb.SheetNames.map(n => ({
      name: n,
      Hidden: n === '_images' ? 1 : 0
    }));

    const arrayBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([arrayBuffer], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    });

    const fname = fileName || 'ipod-data.xlsx';

    // iOS Web Share
    if (navigator.share && navigator.canShare) {
      const shareFile = new File([blob], fname, { type: blob.type });
      if (navigator.canShare({ files: [shareFile] })) {
        navigator.share({ files: [shareFile], title: fname })
          .then(() => { dirty = false; updateDirty(); toast('공유됨'); })
          .catch((err) => {
            if (err.name !== 'AbortError') fallbackDownload(blob, fname);
          });
        return;
      }
    }

    fallbackDownload(blob, fname);

  } catch (err) {
    console.error('Export 실패:', err);
    toast('Export 실패: ' + String(err.message || err).slice(0, 60));
  }
}

function fallbackDownload(blob, fname) {
  const url = URL.createObjectURL(blob);

  if (isIOS) {
    const link = document.getElementById('dlLink');
    link.href = url;
    link.download = fname;
    document.getElementById('dlMsg').innerHTML =
      `<b>${esc(fname)}</b> 준비됨<br>` +
      `아래 버튼을 <b>길게 눌러</b> "다운로드 링크된 파일"<br>` +
      `또는 탭 후 공유 → 파일에 저장`;
    document.getElementById('dlModal').classList.add('show');
    dirty = false;
    updateDirty();
  } else {
    const a = document.createElement('a');
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    dirty = false;
    updateDirty();
    toast('Exported');
  }
}

function closeDownload() {
  document.getElementById('dlModal').classList.remove('show');
}

function saveLocal() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(workbook));
  } catch (e) {
    toast('브라우저 저장 용량 초과');
  }
}

function markDirty() {
  dirty = true;
  updateDirty();
  saveLocal();
}

function updateDirty() {
  const dot = document.getElementById('dirtyDot');
  dot.classList.toggle('clean', !dirty);
  dot.title = dirty ? '저장되지 않음' : '저장됨';
}

async function resizeImage(file, maxDim = 800, quality = 0.8) {
  const dataUrl = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = () => rej(new Error('read fail'));
    fr.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const image = new Image();
    image.onload = () => res(image);
    image.onerror = () => rej(new Error('image load fail'));
    image.src = dataUrl;
  });
  let { width, height } = img;
  const scale = Math.min(1, maxDim / Math.max(width, height));
  width = Math.round(width * scale);
  height = Math.round(height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  canvas.getContext('2d').drawImage(img, 0, 0, width, height);
  return canvas.toDataURL('image/jpeg', quality);
}

async function setImageFromFile(file) {
  if (!file) return;
  try {
    toast('이미지 처리 중…');
    const resized = await resizeImage(file, 800, 0.8);
    const row = currentRow();
    if (!row) return;
    row.image = resized;
    markDirty();
    updatePreview();
    renderRows();
    toast('이미지 설정됨');
  } catch (err) {
    console.error(err);
    toast('이미지 처리 실패');
  }
}

async function goTabs() {
  state.view = 'tabs';
  state.cursor = 0;
  hidePreview();
  setTitle(fileName.replace(/\.xlsx?$/,'').slice(0,18) || 'iPod');
  if (!workbook.tabs.length) {
    return renderEmpty('탭이 없어요.');
  }
  renderList(workbook.tabs.map(t => ({
    label: t.title,
    meta: String(t.rows.length)
  })));
}

async function goRows(idx) {
  state.view = 'rows';
  state.currentTabIdx = idx;
  state.cursor = 0;
  hidePreview();
  const tab = workbook.tabs[idx];
  setTitle(tab.title.slice(0, 18));
  if (!tab.rows.length) {
    return renderEmpty('행이 없어요.<br>A: 이름 / B: 숫자');
  }
  renderRows();
}

function currentTab() { return workbook?.tabs[state.currentTabIdx]; }
function currentRow() { return currentTab()?.rows[state.cursor]; }

function bump(delta) {
  if (state.view !== 'rows') return;
  const row = currentRow();
  if (!row) return;
  row.count = (row.count || 0) + delta;
  markDirty();
  if (state.preview) updatePreview();
  else renderRows();
  toast(delta > 0 ? `+${delta}` : `${delta}`);
}

const listUl = document.getElementById('listUl');
const emptyView = document.getElementById('emptyView');
const previewView = document.getElementById('previewView');
const previewImg = document.getElementById('previewImg');
const previewLabel = document.getElementById('previewLabel');
const previewCount = document.getElementById('previewCount');
const screenTitle = document.getElementById('screenTitle');
const toastEl = document.getElementById('toast');

function setTitle(t) { screenTitle.textContent = t; }

function renderEmpty(html) {
  listUl.style.display = 'none';
  emptyView.style.display = 'block';
  hidePreview();
  emptyView.innerHTML = html;
  const openF = document.getElementById('openFile');
  if (openF) openF.addEventListener('change', onFileOpen);
}

function renderList(items) {
  emptyView.style.display = 'none';
  listUl.style.display = 'block';
  listUl.innerHTML = '';
  items.forEach((it) => {
    const li = document.createElement('li');
    const thumb = it.image
      ? `<span class="thumb" style="background-image:url('${it.image.replace(/'/g,"\\'")}')"></span>`
      : `<span class="thumb"></span>`;
    li.innerHTML = `
      ${thumb}
      <span class="label">${esc(it.label)}</span>
      ${it.meta != null ? `<span class="meta">${esc(it.meta)}</span>` : ''}
      <span class="chev">›</span>`;
    listUl.appendChild(li);
  });
  applyCursor();
}

function renderRows() {
  renderList(currentTab().rows.map(r => ({
    label: r.label, meta: String(r.count), image: r.image
  })));
}

function applyCursor() {
  const lis = [...listUl.querySelectorAll('li')];
  lis.forEach((li, i) => li.classList.toggle('active', i === state.cursor));
  if (!lis.length) return;
  const liH = lis[0].getBoundingClientRect().height || 36;
  const listH = document.getElementById('list').getBoundingClientRect().height;
  const visibleCount = Math.max(1, Math.floor(listH / liH));
  const anchor = Math.min(state.cursor, Math.max(0, lis.length - visibleCount));
  listUl.style.transform = `translateY(${-anchor * liH}px)`;
}

function showPreview() {
  if (state.view !== 'rows' || !currentRow()) return;
  state.preview = true;
  previewView.classList.add('show');
  listUl.style.display = 'none';
  updatePreview();
}
function hidePreview() {
  state.preview = false;
  previewView.classList.remove('show');
  if (state.view === 'tabs' || state.view === 'rows') {
    listUl.style.display = 'block';
  }
}
function updatePreview() {
  const r = currentRow();
  if (!r) return;
  previewImg.src = r.image || '';
  previewImg.style.display = r.image ? 'block' : 'none';
  previewLabel.textContent = r.label;
  previewCount.textContent = `count: ${r.count}`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

const wheel = document.getElementById('wheel');
let dragging = false, lastAngle = 0, accumAngle = 0;
const DEG_PER_ITEM = 24;

function angleFromEvent(e) {
  const r = wheel.getBoundingClientRect();
  return Math.atan2(e.clientY - (r.top + r.height/2),
                    e.clientX - (r.left + r.width/2)) * 180 / Math.PI;
}

wheel.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.center-btn') || e.target.closest('.tag')) return;
  dragging = true;
  wheel.classList.add('dragging');
  wheel.setPointerCapture(e.pointerId);
  lastAngle = angleFromEvent(e);
});
wheel.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const a = angleFromEvent(e);
  let d = a - lastAngle;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  accumAngle += d;
  lastAngle = a;
  while (accumAngle >= DEG_PER_ITEM) { moveCursor(1); accumAngle -= DEG_PER_ITEM; }
  while (accumAngle <= -DEG_PER_ITEM) { moveCursor(-1); accumAngle += DEG_PER_ITEM; }
});
function endDrag() {
  if (!dragging) return;
  dragging = false;
  wheel.classList.remove('dragging');
  accumAngle = 0;
}
wheel.addEventListener('pointerup', endDrag);
wheel.addEventListener('pointercancel', endDrag);

function moveCursor(delta) {
  const max = (state.view === 'tabs' ? workbook?.tabs.length
             : state.view === 'rows' ? currentTab()?.rows.length
             : 0) - 1;
  if (max < 0) return;
  state.cursor = Math.max(0, Math.min(max, state.cursor + delta));
  if (state.preview) updatePreview();
  else applyCursor();
}

document.getElementById('btnMenu').addEventListener('click', () => {
  if (document.getElementById('dlModal').classList.contains('show')) return closeDownload();
  if (state.preview) return hidePreview();
  if (state.view === 'rows') goTabs();
  else if (state.view === 'tabs') showStart();
});
document.getElementById('btnPlay').addEventListener('click', exportWorkbook);
document.getElementById('btnPrev').addEventListener('click', () => {
  if (state.view === 'rows') bump(-1);
});
document.getElementById('btnNext').addEventListener('click', () => {
  if (state.view === 'rows') bump(+1);
});
document.getElementById('centerBtn').addEventListener('click', () => {
  if (state.view === 'tabs') goRows(state.cursor);
  else if (state.view === 'rows') {
    if (state.preview) hidePreview();
    else showPreview();
  }
});

document.getElementById('imgPicker').addEventListener('change', (e) => {
  setImageFromFile(e.target.files?.[0]);
  e.target.value = '';
});

document.addEventListener('change', (e) => {
  if (e.target?.id === 'openFile') onFileOpen(e);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown') moveCursor(1);
  else if (e.key === 'ArrowUp') moveCursor(-1);
  else if (e.key === 'ArrowLeft' && state.view === 'rows') bump(-1);
  else if (e.key === 'ArrowRight' && state.view === 'rows') bump(+1);
  else if (e.key === 'Enter') document.getElementById('centerBtn').click();
  else if (e.key === 'Escape' || e.key === 'Backspace') document.getElementById('btnMenu').click();
  else if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportWorkbook(); }
});

wheel.addEventListener('wheel', (e) => {
  e.preventDefault();
  moveCursor(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

window.addEventListener('beforeunload', (e) => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

start();
</script>

</body>
</html>
