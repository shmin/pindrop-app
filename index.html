<!doctype html>

<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>iPod × Local Excel</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
  :root {
    --bg: #d9d5cc;
    --body-edge: #c9c4b8;
    --screen: #cfd7c7;
    --screen-2: #b9c3ac;
    --wheel-edge: #b9b4a8;
    --bar-color: #2e55a8;
    --anim-dur: 280ms;
    --anim-ease: cubic-bezier(.22,.8,.25,1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(1000px 700px at 50% 20%, #e7e3d8 0%, transparent 60%),
      var(--bg);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

.ipod { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 12px 10px 10px; gap: 8px; }
.ipod-body {
flex: 1;
background: linear-gradient(180deg, #fbf9f4 0%, #eae6dc 100%);
border-radius: 28px;
padding: 14px 14px 10px;
box-shadow:
inset 0 1px 0 rgba(255,255,255,.9),
inset 0 -2px 0 rgba(0,0,0,.06),
0 12px 30px rgba(30,30,30,.2),
0 0 0 1px var(–body-edge);
display: flex; flex-direction: column; min-height: 0;
}
.screen {
flex: 1; min-height: 0;
border-radius: 6px;
background: linear-gradient(180deg, var(–screen) 0%, var(–screen-2) 100%);
box-shadow:
inset 0 2px 6px rgba(0,0,0,.25),
inset 0 -1px 0 rgba(255,255,255,.3),
0 0 0 4px #1a1a1a, 0 0 0 5px #3a3a3a;
overflow: hidden; position: relative;
}
.titlebar {
height: 26px;
background: linear-gradient(180deg, #4a77c9, var(–bar-color));
color: #fff;
display: flex; align-items: center; justify-content: center;
padding: 0 10px; font-size: 13px; font-weight: 700; position: relative;
flex-shrink: 0;
}
.titlebar::before {
content: “”; position: absolute; inset: 0 0 auto 0; height: 45%;
background: linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0));
}
.titlebar .t-text { position: relative; z-index: 1; }

.view-stack { position: absolute; top: 26px; bottom: 0; left: 0; right: 0; overflow: hidden; }
.view {
position: absolute; inset: 0;
background: linear-gradient(180deg, var(–screen) 0%, var(–screen-2) 100%);
overflow: hidden;
transition: transform var(–anim-dur) var(–anim-ease);
will-change: transform;
}
.view.slide-in-right  { transform: translateX(100%); }
.view.slide-in-left   { transform: translateX(-100%); }
.view.slide-out-left  { transform: translateX(-100%); }
.view.slide-out-right { transform: translateX(100%); }
.view.show            { transform: translateX(0); }

.list { position: absolute; inset: 0; overflow: hidden; }
.list ul { list-style: none; margin: 0; padding: 0; transition: transform .18s cubic-bezier(.2,.8,.2,1); }
.list li {
padding: 6px 12px;
font-size: 15px; line-height: 1.2;
border-bottom: 1px solid rgba(0,0,0,.06);
display: flex; align-items: center; gap: 10px;
min-height: 44px;
}
.list li .label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list li .meta { color: #555; font-size: 12px; flex-shrink: 0; }
.list li .chev { color: #555; font-size: 14px; }
.list li.active {
background: linear-gradient(180deg, #4a77c9, var(–bar-color));
color: #fff;
}
.list li.active .meta, .list li.active .chev { color: rgba(255,255,255,.95); }

.sheet-view {
position: absolute; inset: 0;
overflow: auto; font-size: 12px;
-webkit-overflow-scrolling: touch;
}
.sheet-view table {
border-collapse: separate; border-spacing: 0;
width: max-content; min-width: 100%;
}
.sheet-view th, .sheet-view td {
border-right: 1px solid rgba(0,0,0,.1);
border-bottom: 1px solid rgba(0,0,0,.08);
padding: 6px 8px;
min-width: 92px; max-width: 160px;
overflow: hidden; text-overflow: ellipsis;
white-space: nowrap; vertical-align: middle;
}
.sheet-view th {
background: linear-gradient(180deg, #4a77c9, var(–bar-color));
color: #fff; font-weight: 700; font-size: 11px;
text-align: left; position: sticky; top: 0; z-index: 3;
}
.sheet-view th.row-head, .sheet-view td.row-head {
background: #e4e1d7; position: sticky; left: 0; z-index: 2;
font-weight: 600; color: #333;
min-width: 70px; max-width: 110px;
}
.sheet-view th.row-head { z-index: 4; }
.sheet-view td.cell-img { padding: 3px; }
.sheet-view td.cell-img .thumb {
width: 30px; height: 30px; border-radius: 4px;
background: rgba(0,0,0,.08) center/cover no-repeat;
border: 1px solid rgba(0,0,0,.15);
display: inline-block;
}
.sheet-view td.empty-cell { color: #bbb; font-style: italic; }
.sheet-view td.active, .sheet-view th.active {
background: rgba(74,119,201,.25);
outline: 2px solid var(–bar-color);
outline-offset: -2px;
color: #1a1a1a;
}
.sheet-view th.active {
background: linear-gradient(180deg, #6a97e9, #3e65b8);
color: #fff;
}
.sheet-view td.row-head.active-row { background: #c9c6ba; }
.sheet-view th.active.row-head {
background: #b8b4a6; color: #1a1a1a;
}

.sheet-view th.add-col, .sheet-view td.add-col {
background: #f6f3eb;
color: var(–bar-color);
font-weight: 600;
text-align: center;
min-width: 92px;
cursor: pointer;
}
.sheet-view th.add-col { background: #d9d5c8; color: #4a77c9; }
.sheet-view tr.add-row td {
background: #f6f3eb;
color: var(–bar-color);
font-weight: 600;
text-align: center;
cursor: pointer;
}
.sheet-view tr.add-row td.row-head { color: var(–bar-color); }

/* 큰 보기 (썸네일/텍스트 상세) */
.bigview {
position: absolute; inset: 0;
background: #000;
overflow: hidden;
}
/* 꽉 차는 이미지 레이어 */
.bigview .bv-img {
position: absolute; inset: 0;
width: 100%; height: 100%;
object-fit: contain;
background: #000;
}
/* 오버레이 (상단/하단 반투명) */
.bigview .bv-overlay-top {
position: absolute; top: 0; left: 0; right: 0;
padding: 12px 16px;
background: linear-gradient(180deg, rgba(0,0,0,.7) 0%, rgba(0,0,0,0) 100%);
color: #fff;
pointer-events: none;
z-index: 2;
}
.bigview .bv-overlay-bottom {
position: absolute; bottom: 0; left: 0; right: 0;
padding: 16px;
background: linear-gradient(0deg, rgba(0,0,0,.75) 0%, rgba(0,0,0,0) 100%);
color: #fff;
pointer-events: none;
z-index: 2;
display: flex; flex-direction: column; gap: 4px;
}
.bigview .bv-head {
color: #fff; font-size: 13px; font-weight: 600;
letter-spacing: .03em;
text-shadow: 0 1px 3px rgba(0,0,0,.8);
}
.bigview .bv-hint {
color: rgba(255,255,255,.7); font-size: 11px;
text-shadow: 0 1px 2px rgba(0,0,0,.8);
}
/* 텍스트 전용 셀일 때: 중앙 큰 텍스트 */
.bigview .bv-text-wrap {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
padding: 56px 20px;
}
.bigview .bv-text {
color: #fff; font-size: 20px; line-height: 1.5;
max-width: 100%; max-height: 100%; overflow: auto;
text-align: center; white-space: pre-wrap;
word-break: break-word;
text-shadow: 0 1px 3px rgba(0,0,0,.6);
}
.bigview .bv-empty {
color: rgba(255,255,255,.4); font-size: 15px; font-style: italic;
display: flex; align-items: center; justify-content: center;
height: 100%;
}
/* 헤더 정보 표시 */
.bigview .bv-header-info {
position: absolute; inset: 0;
display: flex; flex-direction: column; align-items: center; justify-content: center;
gap: 14px; padding: 56px 20px; color: #fff;
}
.bigview .bv-header-info .bh-title {
font-size: 22px; font-weight: 700;
}
.bigview .bv-header-info .bh-sub {
color: rgba(255,255,255,.6); font-size: 13px;
}
.bigview .bv-header-info .bh-opts {
color: rgba(255,255,255,.85); font-size: 13px;
max-width: 80%; text-align: center; line-height: 1.6;
}

/* 편집 화면 */
.editor {
position: absolute; inset: 0;
overflow-y: auto; padding: 14px;
-webkit-overflow-scrolling: touch;
}
.editor .ed-label {
font-size: 11px; color: #666; text-transform: uppercase;
letter-spacing: .1em; margin-bottom: 4px;
}
.editor .ed-rowname { font-size: 18px; font-weight: 700; margin-bottom: 14px; color: #222; }
.editor .ed-field {
font-size: 13px; color: #555; margin: 10px 0 6px;
display: flex; align-items: center; gap: 6px;
}
.editor .ed-field .badge {
font-size: 10px; padding: 1px 6px; border-radius: 10px;
background: #e4e1d7; color: #555;
}
.editor .options-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.editor .options-row .opt {
background: #fff; border: 1px solid #cfcbbf;
border-radius: 14px; padding: 5px 12px; font-size: 13px;
cursor: pointer;
}
.editor .options-row .opt.selected {
background: var(–bar-color); color: #fff; border-color: var(–bar-color);
}
.editor textarea.ed-input,
.editor input.ed-input {
width: 100%; padding: 8px 10px;
border: 1px solid #c9c4b8; border-radius: 6px;
font-family: inherit; font-size: 14px; background: #fff;
}
.editor textarea.ed-input { min-height: 64px; resize: vertical; }
.editor textarea.ed-input:focus, .editor input.ed-input:focus {
outline: 2px solid var(–bar-color); outline-offset: -1px;
}
.editor .img-block {
background: #fff; border: 1px dashed #c9c4b8; border-radius: 8px;
padding: 10px; text-align: center;
display: flex; flex-direction: column; gap: 8px; align-items: center;
}
.editor .img-block img { max-width: 100%; max-height: 160px; border-radius: 6px; }
.editor .img-block .btns { display: flex; gap: 6px; }
.editor .img-block button, .editor .img-block label {
background: var(–bar-color); color: #fff;
border: none; border-radius: 5px;
padding: 5px 12px; font-size: 12px; cursor: pointer;
}
.editor .img-block button.del { background: #c44; }
.editor .img-block input[type=file] { display: none; }

.editor .danger-zone {
margin-top: 16px; padding-top: 14px;
border-top: 1px dashed #d3cec3;
}
.editor .danger-zone button {
width: 100%; padding: 8px;
background: transparent;
border: 1px solid #c44; color: #c44;
border-radius: 6px; font-size: 12px; cursor: pointer;
margin-bottom: 6px;
}
.editor .danger-zone button:active { background: #fee; }

.editor-actions {
position: sticky; bottom: 0;
display: flex; gap: 8px; padding: 10px 0 0;
background: linear-gradient(180deg, rgba(207,215,199,0) 0%, var(–screen) 30%);
}
.editor-actions button {
flex: 1; padding: 10px;
border: none; border-radius: 8px;
font-size: 14px; font-weight: 700; letter-spacing: .04em;
cursor: pointer;
}
.editor-actions .cancel { background: #ddd7c8; color: #333; }
.editor-actions .save   { background: var(–bar-color); color: #fff; }

.empty { padding: 24px 18px; font-size: 14px; color: #333; text-align: center; line-height: 1.6; }
.empty .big { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
.empty button, .empty label.btn {
display: inline-block; margin: 8px 4px 0;
background: var(–bar-color); color: #fff; border: none;
padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
}
.empty label.btn.ghost { background: transparent; color: var(–bar-color); border: 1px solid var(–bar-color); }
.empty label.btn.danger { background: transparent; color: #c44; border: 1px solid #c44; font-size: 12px; }
.empty input[type=file] { display: none; }

.dlmodal {
position: absolute; inset: 26px 0 0 0;
background: rgba(0,0,0,.9);
display: none; align-items: center; justify-content: center;
flex-direction: column; gap: 12px; padding: 20px; z-index: 100;
}
.dlmodal.show { display: flex; }
.dlmodal p { color: #fff; font-size: 13px; text-align: center; margin: 0; line-height: 1.5; }
.dlmodal a.dlbtn { background: var(–bar-color); color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
.dlmodal button { background: transparent; color: #ccc; border: 1px solid #555; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }

.toast {
position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
background: rgba(0,0,0,.8); color: #fff; font-size: 13px;
padding: 8px 14px; border-radius: 16px; opacity: 0; transition: opacity .2s;
pointer-events: none; white-space: nowrap; z-index: 200;
max-width: 80%; text-align: center;
}
.toast.show { opacity: 1; }

/* ── 컨트롤 영역: MENU/EDIT (휠 밖) + 휠 ── */
.controls-wrap {
display: flex; flex-direction: column; align-items: center;
padding-top: 12px; flex-shrink: 0; gap: 8px;
}
.top-btns {
display: flex; justify-content: space-between;
width: min(72%, 300px);
gap: 12px;
}
.top-btn {
flex: 1;
padding: 7px 10px;
border: none;
background: linear-gradient(180deg, #f0eee8 0%, #dbd7ce 100%);
border-radius: 8px;
font-size: 11px; font-weight: 700; letter-spacing: .1em;
color: #3a3a3a;
cursor: pointer;
box-shadow:
inset 0 1px 0 rgba(255,255,255,.7),
0 1px 3px rgba(0,0,0,.12),
0 0 0 1px var(–wheel-edge);
transition: transform .08s, box-shadow .08s;
}
.top-btn:active {
transform: translateY(1px);
box-shadow: inset 0 2px 3px rgba(0,0,0,.15), 0 0 0 1px var(–wheel-edge);
}
.top-btn.edit {
background: linear-gradient(180deg, #6a97e9 0%, #3e65b8 100%);
color: #fff;
}

.wheel {
width: min(58%, 240px); aspect-ratio: 1/1; border-radius: 50%;
position: relative;
background: radial-gradient(circle at 50% 40%, #f4f1ea 0%, #dcd8ce 70%, #c9c4b8 100%);
box-shadow:
inset 0 2px 4px rgba(255,255,255,.8),
inset 0 -6px 14px rgba(0,0,0,.12),
0 2px 6px rgba(0,0,0,.15),
0 0 0 1px var(–wheel-edge);
cursor: grab; touch-action: none; overflow: hidden;
}
.wheel::before {
content: “”; position: absolute; inset: 6%; border-radius: 50%;
background: repeating-conic-gradient(
from 0deg,
rgba(0,0,0,0) 0deg, rgba(0,0,0,0) 3deg,
rgba(0,0,0,.04) 3deg, rgba(0,0,0,.04) 3.5deg
);
transform: rotate(var(–rot, 0deg));
transition: transform .08s linear;
pointer-events: none;
}
.wheel.dragging { cursor: grabbing; }
.wheel .tickmark {
position: absolute; top: 3%; left: 50%;
width: 3px; height: 7px; background: #4a77c9;
border-radius: 2px; transform: translateX(-50%);
opacity: 0; pointer-events: none;
}
.wheel .tickmark.flash { opacity: 1; box-shadow: 0 0 8px #4a77c9; transition: opacity .05s ease-out; }
.wheel .tickmark.fade  { opacity: 0; transition: opacity .3s ease; }
.wheel .fingerLight {
position: absolute;
width: 42px; height: 42px; border-radius: 50%;
background: radial-gradient(circle,
rgba(74,119,201,.4) 0%, rgba(74,119,201,.15) 40%, transparent 70%);
transform: translate(-50%, -50%) scale(0);
transition: transform .2s ease, opacity .2s ease;
opacity: 0; pointer-events: none; mix-blend-mode: multiply;
}
.wheel.dragging .fingerLight { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* 4방향 삼각형 */
.arrow {
position: absolute;
color: #4a4a4a;
cursor: pointer; z-index: 2;
font-size: 16px;
line-height: 1;
padding: 6px;
}
.arrow.up    { top: 6%; left: 50%; transform: translateX(-50%); }
.arrow.down  { bottom: 6%; left: 50%; transform: translateX(-50%); }
.arrow.left  { top: 50%; left: 6%; transform: translateY(-50%); }
.arrow.right { top: 50%; right: 6%; transform: translateY(-50%); }
.arrow:active { color: var(–bar-color); }

.center-btn {
position: absolute; top: 50%; left: 50%;
width: 38%; height: 38%;
transform: translate(-50%, -50%);
border: none; border-radius: 50%;
background: radial-gradient(circle at 50% 35%, #ffffff 0%, #e8e4da 75%);
box-shadow:
inset 0 1px 0 rgba(255,255,255,.9),
inset 0 -4px 10px rgba(0,0,0,.08),
0 1px 3px rgba(0,0,0,.15),
0 0 0 1px var(–wheel-edge);
cursor: pointer; z-index: 3;
}
.center-btn:active { box-shadow: inset 0 2px 4px rgba(0,0,0,.12), 0 0 0 1px var(–wheel-edge); }

.btn-panel {
display: flex; gap: 10px;
padding: 12px 14px 14px;
background: linear-gradient(180deg, #eae6dc 0%, #ddd9d0 100%);
border-radius: 18px;
box-shadow: 0 10px 24px rgba(30,30,30,.18), 0 0 0 1px var(–body-edge);
flex-shrink: 0;
}
.btn-panel button {
flex: 1; padding: 12px 0;
border: none; border-radius: 12px;
font-size: 13px; font-weight: 700; letter-spacing: .08em;
cursor: pointer; position: relative;
box-shadow: inset 0 1px 0 rgba(255,255,255,.7), 0 2px 4px rgba(0,0,0,.15);
transition: transform .08s, box-shadow .08s;
}
.btn-panel button:active { transform: translateY(1px); box-shadow: inset 0 2px 3px rgba(0,0,0,.15); }
.btn-save   { background: linear-gradient(180deg, #f0eee8 0%, #dbd7ce 100%); color: #3a3a3a; }
.btn-export { background: linear-gradient(180deg, #4a77c9 0%, var(–bar-color) 100%); color: #fff;
box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 2px 4px rgba(46,85,168,.4) !important; }
.btn-panel .dot {
position: absolute; top: 7px; right: 8px;
width: 7px; height: 7px; border-radius: 50%;
background: #ff9d5a; box-shadow: 0 0 4px rgba(255,180,80,.8);
}
.btn-panel .dot.clean { background: #a0e878; box-shadow: 0 0 4px rgba(160,230,120,.8); }

@media (orientation: landscape) and (max-height: 500px) {
.ipod { flex-direction: row; padding: 8px; }
.ipod-body { flex: 1.5; }
.btn-panel { flex-direction: column; min-width: 100px; }
}
</style>

</head>

<script>
window.addEventListener('error', (e) => { console.error(e); toast('에러: ' + (e.message || '').slice(0, 60)); });
window.addEventListener('unhandledrejection', (e) => { console.error(e); toast('에러: ' + String(e.reason).slice(0, 60)); });

const LS_KEY = 'ipod-wb-v6';
const LS_FILENAME = 'ipod-filename-v6';
const IMG_HEADER_PATTERN = /^(사진|image|photo|img|이미지)/i;

let workbook = null;
let fileName = localStorage.getItem(LS_FILENAME) || 'ipod-data.xlsx';
let dirty = false;

// view: 'init' | 'tabs' | 'sheet' | 'bigview' | 'editor'
// sheet에서 rowCursor -1 = 헤더행(1행), 0..rows.length-1 = 실제, rows.length = "+행"
// sheet에서 colCursor 0 = label(1열), 1..headers.length-1 = 실제, headers.length = "+열"
const state = {
  view: 'init',
  currentTabIdx: -1,
  rowCursor: 0,
  colCursor: 0,
  editor: null,
};

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// ====== 오디오/피드백 ======
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (audioCtx?.state === 'suspended') audioCtx.resume();
}
function playTick() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(2200, now);
  osc.frequency.exponentialRampToValueAtTime(800, now + 0.02);
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.04);
}

  direction = direction || 'forward';

// ============================================================
// 파싱
// ============================================================
async function parseWorkbook(arrayBuffer) {
  const wb = new ExcelJS.Workbook();
  await wb.xlsx.load(arrayBuffer);

  const optionsMap = {};
  const optSheet = wb.getWorksheet('_options');
  if (optSheet) {
    const last = optSheet.rowCount;
    for (let r = 2; r <= last; r++) {
      const row = optSheet.getRow(r);
      const sheetName = cellText(row.getCell(1));
      const header    = cellText(row.getCell(2));
      const optsStr   = cellText(row.getCell(3));
      if (!sheetName || !header || !optsStr) continue;
      const opts = optsStr.split(',').map(s => s.trim()).filter(s => s !== '');
      optionsMap[sheetName + '::' + header] = opts;
    }
  }

  const tabs = [];
  wb.eachSheet((sheet) => {
    if (sheet.name === '_options') return;
    const imagesByPos = {};
    try {
      const imgList = sheet.getImages() || [];
      imgList.forEach((img) => {
        const rowNum = (img.range?.tl?.nativeRow ?? 0) + 1;
        const colNum = (img.range?.tl?.nativeCol ?? 0) + 1;
        const media = wb.model.media.find(m => m.index === img.imageId);
        if (!media) return;
        const dataUrl = mediaToDataUrl(media);
        if (dataUrl) imagesByPos[rowNum + ':' + colNum] = dataUrl;
      });
    } catch(e) { console.warn('이미지 파싱 실패', e); }

    const headerRow = sheet.getRow(1);
    const headers = [];
    let lastCol = sheet.columnCount || 1;
    for (let c = 1; c <= lastCol; c++) headers.push(cellText(headerRow.getCell(c)));
    while (headers.length && !headers[headers.length - 1]) headers.pop();
    if (!headers.length) headers.push('A');

    const columnTypes = headers.map((h, i) =>
      i === 0 ? 'label' : (IMG_HEADER_PATTERN.test(h) ? 'image' : 'text'));

    const columnOptions = {};
    headers.forEach((h, i) => {
      const key = sheet.name + '::' + h;
      if (optionsMap[key]) columnOptions[i] = optionsMap[key];
    });

    const rows = [];
    const lastRow = sheet.rowCount;
    for (let r = 2; r <= lastRow; r++) {
      const row = sheet.getRow(r);
      const cells = [];
      let hasContent = false;
      for (let c = 1; c <= headers.length; c++) {
        if (columnTypes[c - 1] === 'image') {
          const img = imagesByPos[r + ':' + c] || '';
          cells.push(img);
          if (img) hasContent = true;
        } else {
          const t = cellText(row.getCell(c));
          cells.push(t);
          if (t) hasContent = true;
        }
      }
      if (!hasContent && !cells[0]) continue;
      rows.push({ cells });
    }

    tabs.push({ title: sheet.name, headers, columnTypes, columnOptions, rows });
  });

  if (!tabs.length) tabs.push({ title: 'Sheet1', headers: ['라벨'], columnTypes: ['label'], columnOptions: {}, rows: [] });
  return { tabs };
}

function cellText(cell) {
  const v = cell?.value;
  if (v == null) return '';
  if (typeof v === 'object') {
    if (v.richText) return v.richText.map(t => t.text).join('').trim();
    if (v.result != null) return String(v.result).trim();
    if (v.text != null) return String(v.text).trim();
    if (v.hyperlink && v.text) return String(v.text).trim();
    return '';
  }
  return String(v).trim();
}
function mediaToDataUrl(media) {
  try {
    const ext = (media.extension || 'png').toLowerCase();
    const mime = ext === 'jpg' || ext === 'jpeg' ? 'image/jpeg'
               : ext === 'png' ? 'image/png'
               : ext === 'gif' ? 'image/gif' : 'image/png';
    let base64 = '';
    if (media.buffer) {
      const bytes = new Uint8Array(media.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      base64 = btoa(binary);
    } else if (media.base64) base64 = media.base64;
    else return '';
    return 'data:' + mime + ';base64,' + base64;
  } catch(e) { return ''; }
}

// ============================================================
// Export
// ============================================================
async function buildAndExport() {
  if (!workbook) return;
  try {
    toast('Export 중...');
    const wb = new ExcelJS.Workbook();
    const optsAoa = [['sheet', 'header', 'options']];
    workbook.tabs.forEach(tab => {
      Object.keys(tab.columnOptions || {}).forEach(colIdx => {
        const header = tab.headers[Number(colIdx)];
        const opts = tab.columnOptions[colIdx];
        if (header && opts?.length) optsAoa.push([tab.title, header, opts.join(', ')]);
      });
    });

    for (const tab of workbook.tabs) {
      const ws = wb.addWorksheet(tab.title);
      ws.addRow(tab.headers);
      const hasImgCol = tab.columnTypes.some(t => t === 'image');
      tab.headers.forEach((h, i) => {
        const col = ws.getColumn(i + 1);
        col.width = tab.columnTypes[i] === 'image' ? 12 : Math.max(10, (h || '').length + 4);
      });
      tab.rows.forEach((r, i) => {
        const rowData = r.cells.map((v, c) => tab.columnTypes[c] === 'image' ? '' : v);
        const row = ws.addRow(rowData);
        if (hasImgCol) row.height = 60;
        r.cells.forEach((v, c) => {
          if (tab.columnTypes[c] !== 'image' || !v) return;
          const imgInfo = dataUrlToBuffer(v);
          if (!imgInfo) return;
          const imageId = wb.addImage({ buffer: imgInfo.buffer, extension: imgInfo.ext });
          ws.addImage(imageId, { tl: { col: c, row: i + 1 }, ext: { width: 75, height: 75 } });
        });
      });
      const hr = ws.getRow(1);
      hr.font = { bold: true };
      hr.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE8E8E8' } };
    }

    if (optsAoa.length > 1) {
      const optWs = wb.addWorksheet('_options', { state: 'hidden' });
      optsAoa.forEach(r => optWs.addRow(r));
      optWs.getRow(1).font = { bold: true };
    }

    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const fname = fileName || 'ipod-data.xlsx';

    if (navigator.share && navigator.canShare) {
      const sf = new File([blob], fname, { type: blob.type });
      if (navigator.canShare({ files: [sf] })) {
        navigator.share({ files: [sf], title: fname })
          .then(() => toast('공유됨'))
          .catch(err => { if (err.name !== 'AbortError') fallbackDownload(blob, fname); });
        return;
      }
    }
    fallbackDownload(blob, fname);
  } catch(err) { console.error(err); toast('Export 실패: ' + String(err.message).slice(0, 50)); }
}
function dataUrlToBuffer(dataUrl) {
  try {
    const m = dataUrl.match(/^data:image\/(\w+);base64,(.+)$/);
    if (!m) return null;
    const ext = m[1] === 'jpg' ? 'jpeg' : m[1];
    const binary = atob(m[2]);
    const buffer = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) buffer[i] = binary.charCodeAt(i);
    return { buffer, ext };
  } catch(e) { return null; }
}
function fallbackDownload(blob, fname) {
  const url = URL.createObjectURL(blob);
  if (isIOS) {
    const link = document.getElementById('dlLink');
    link.href = url; link.download = fname;
    document.getElementById('dlMsg').innerHTML = '<b>' + esc(fname) + '</b><br>버튼을 <b>길게 눌러</b> 다운로드';
    document.getElementById('dlModal').classList.add('show');
  } else {
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    toast('Export 완료');
  }
}
function closeDownload() { document.getElementById('dlModal').classList.remove('show'); }

function saveLocal() { try { localStorage.setItem(LS_KEY, JSON.stringify(workbook)); } catch(e) { toast('저장 용량 초과'); } }
function markDirty() { dirty = true; updateDirty(); }
function updateDirty() {
  const dot = document.getElementById('dirtyDot');
  dot.classList.toggle('clean', !dirty);
}

async function resizeImage(file, maxDim, quality) {
  maxDim = maxDim || 800; quality = quality || 0.8;
  const dataUrl = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = () => rej(new Error('read fail'));
    fr.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const image = new Image();
    image.onload = () => res(image);
    image.onerror = () => rej(new Error('image load fail'));
    image.src = dataUrl;
  });
  let { width, height } = img;
  const scale = Math.min(1, maxDim / Math.max(width, height));
  width = Math.round(width * scale); height = Math.round(height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  canvas.getContext('2d').drawImage(img, 0, 0, width, height);
  return canvas.toDataURL('image/jpeg', quality);
}

// ====== 뷰: 탭 목록 ======
function goTabs(initial) {
  const wasDeeper = (state.view !== 'init' && state.view !== 'tabs');
  state.view = 'tabs';
  state.rowCursor = 0;
  setTitle(fileName.replace(/\.xlsx?$/,'').slice(0,24) || 'iPod');

  if (!workbook || !workbook.tabs.length) { showEmptyView('탭이 없어요.', wasDeeper ? 'backward' : 'forward'); return; }

  let html = '<div class="list"><ul>';
  workbook.tabs.forEach((t, i) => {
    html += '<li data-idx="' + i + '" class="' + (i === state.rowCursor ? 'active' : '') + '">';
    html += '<span class="label">' + esc(t.title) + '</span>';
    html += '<span class="meta">' + t.rows.length + '행 × ' + t.headers.length + '열</span>';
    html += '<span class="chev">›</span></li>';
  });
  html += '</ul></div>';

  const v = createView(html);
  if (initial) setFirstView(v); else transitionTo(v, wasDeeper ? 'backward' : 'forward');
  setTimeout(applyListCursor, ANIM_DUR + 20);
}

// ====== 뷰: 스프레드시트 ======
function goSheet(idx, direction) {
  direction = direction || 'forward';
  state.view = 'sheet';
  state.currentTabIdx = idx;
  const tab = workbook.tabs[idx];
  // 초기 커서 복구 또는 안전 범위 보정
  if (state.rowCursor < -1) state.rowCursor = -1;
  if (state.rowCursor > tab.rows.length) state.rowCursor = tab.rows.length;
  if (state.colCursor < 0) state.colCursor = 0;
  if (state.colCursor > tab.headers.length) state.colCursor = tab.headers.length;
  setTitle(tab.title.slice(0, 24));

  const html = renderSheetHtml(tab);
  const v = createView(html);
  transitionTo(v, direction);
  setTimeout(() => { applyCellCursor(); scrollActiveIntoView(); }, ANIM_DUR + 20);
}

/**
 * rowCursor -1 = 헤더(1행), 0..rows.length-1 = 실제 행, rows.length = +행
 * colCursor  0 = label(1열), 1..headers.length-1 = 일반, headers.length = +열
 */
function renderSheetHtml(tab) {
  const rN = tab.rows.length;
  const cN = tab.headers.length;

  let html = '<div class="sheet-view"><table>';
  // 헤더 (클릭 가능한 셀로 취급)
  html += '<thead><tr>';
  tab.headers.forEach((h, i) => {
    const cls = i === 0 ? 'row-head' : '';
    html += '<th class="' + cls + '" data-row="-1" data-col="' + i + '">' + esc(h || ('col' + (i+1))) + '</th>';
  });
  html += '<th class="add-col" data-row="-1" data-col="' + cN + '">＋ 열</th>';
  html += '</tr></thead><tbody>';

  tab.rows.forEach((r, rIdx) => {
    html += '<tr data-row="' + rIdx + '">';
    r.cells.forEach((v, cIdx) => {
      const type = tab.columnTypes[cIdx];
      if (type === 'label') {
        html += '<td class="row-head" data-row="' + rIdx + '" data-col="' + cIdx + '">' + esc(v || '') + '</td>';
      } else if (type === 'image') {
        html += '<td class="cell-img" data-row="' + rIdx + '" data-col="' + cIdx + '">';
        if (v) html += '<span class="thumb" style="background-image:url(&quot;' + v + '&quot;)"></span>';
        html += '</td>';
      } else {
        const shown = v || '';
        html += '<td data-row="' + rIdx + '" data-col="' + cIdx + '" class="' + (shown ? '' : 'empty-cell') + '">';
        html += esc(shown || '—') + '</td>';
      }
    });
    html += '<td class="add-col" data-row="' + rIdx + '" data-col="' + cN + '">＋</td>';
    html += '</tr>';
  });

  // +행 추가 행
  html += '<tr class="add-row" data-row="' + rN + '">';
  for (let c = 0; c < cN; c++) {
    const cls = c === 0 ? 'row-head' : '';
    html += '<td class="' + cls + '" data-row="' + rN + '" data-col="' + c + '">' + (c === 0 ? '＋ 행' : '') + '</td>';
  }
  html += '<td class="add-col" data-row="' + rN + '" data-col="' + cN + '">＋</td>';
  html += '</tr>';
  html += '</tbody></table></div>';
  return html;
}

function applyCellCursor() {
  if (!currentView) return;
  const table = currentView.querySelector('.sheet-view table');
  if (!table) return;
  table.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
  table.querySelectorAll('.active-row').forEach(el => el.classList.remove('active-row'));

  // 헤더 활성화
  if (state.rowCursor === -1) {
    const th = table.querySelector('th[data-col="' + state.colCursor + '"]');
    if (th) th.classList.add('active');
  } else {
    const cell = table.querySelector('td[data-row="' + state.rowCursor + '"][data-col="' + state.colCursor + '"]');
    if (cell) cell.classList.add('active');
    const rowHead = table.querySelector('td.row-head[data-row="' + state.rowCursor + '"]');
    if (rowHead && state.colCursor !== 0) rowHead.classList.add('active-row');
  }
}

function scrollActiveIntoView() {
  if (!currentView) return;
  const cell = currentView.querySelector('.active');
  if (cell) cell.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
}

// ====== 가운데 버튼: 크게 보기 ======
function onCenterPress() {
  const tab = currentTab();
  if (!tab) return;

  // 가상 셀 (+행/+열)은 가운데 누르면 추가 편집 열기
  if (state.rowCursor === tab.rows.length) { openNewRowEditor(); return; }
  if (state.colCursor === tab.headers.length) { openNewColEditor(); return; }

  // 헤더행(-1)은 가운데 누르면 그냥 헤더 라벨 크게 표시
  if (state.rowCursor === -1) {
    showBigViewForHeader();
    return;
  }

  showBigViewForCell();
}

function showBigViewForCell() {
  const tab = currentTab();
  const row = tab.rows[state.rowCursor];
  if (!row) return;
  const colIdx = state.colCursor;
  const type = tab.columnTypes[colIdx];
  const header = tab.headers[colIdx] || ('col' + (colIdx + 1));
  const val = row.cells[colIdx];
  const label = row.cells[0] || '—';

  const wasBigview = state.view === 'bigview';
  state.view = 'bigview';
  setTitle('보기');

  let html = '<div class="bigview">';

  if (type === 'image') {
    // 이미지를 꽉 채움
    if (val) {
      html += '<img class="bv-img" src="' + val + '" alt=""/>';
    } else {
      html += '<div class="bv-empty">사진 없음</div>';
    }
  } else {
    // 텍스트는 중앙에 크게
    html += '<div class="bv-text-wrap">';
    if (val) {
      html += '<div class="bv-text">' + esc(val) + '</div>';
    } else {
      html += '<div class="bv-empty">(빈 값)</div>';
    }
    html += '</div>';
  }

  // 상단 오버레이: 행·열 정보
  html += '<div class="bv-overlay-top">';
  html += '<div class="bv-head">' + esc(label) + ' · ' + esc(header) + '</div>';
  html += '</div>';

  // 하단 오버레이: 조작 힌트
  html += '<div class="bv-overlay-bottom">';
  html += '<div class="bv-hint">휠/화살표: 다음 셀 · EDIT: 편집 · MENU: 닫기</div>';
  html += '</div>';

  html += '</div>';

  if (wasBigview && currentView) {
    currentView.innerHTML = html;
  } else {
    const v = createView(html);
    transitionTo(v, 'forward');
  }
}

function showBigViewForHeader() {
  const tab = currentTab();
  const colIdx = state.colCursor;
  const header = tab.headers[colIdx] || '';
  const type = tab.columnTypes[colIdx];
  const options = tab.columnOptions?.[colIdx] || [];

  const wasBigview = state.view === 'bigview';
  state.view = 'bigview';
  setTitle('열 정보');

  let html = '<div class="bigview">';
  html += '<div class="bv-header-info">';
  html += '<div class="bh-sub">헤더 · ' + (colIdx + 1) + '열</div>';
  html += '<div class="bh-title">' + esc(header) + '</div>';
  html += '<div class="bh-sub">타입: ' + (type === 'image' ? '이미지' : (type === 'label' ? '라벨' : '텍스트')) + '</div>';
  if (options.length) {
    html += '<div class="bh-opts">옵션: ' + options.map(esc).join(', ') + '</div>';
  }
  html += '</div>';

  html += '<div class="bv-overlay-bottom">';

// ====== EDIT 버튼: 편집 열기 ======
function onEditPress() {
  if (state.view === 'bigview') {
    // 큰 보기에서 EDIT → 해당 셀/헤더 편집
    if (state.rowCursor === -1) openHeaderEditor();
    else openCellEditor();
    return;
  }
  if (state.view === 'sheet') {
    const tab = currentTab();
    if (!tab) return;

    // +행/+열은 가운데든 EDIT든 같은 동작
    if (state.rowCursor === tab.rows.length) { openNewRowEditor(); return; }
    if (state.colCursor === tab.headers.length) { openNewColEditor(); return; }

    if (state.rowCursor === -1) {
      // 헤더 → 열 편집
      openHeaderEditor();
    } else if (state.colCursor === 0) {
      // 라벨 열 → 행 편집 (라벨 텍스트만 편집)
      openLabelEditor();
    } else {
      // 일반 셀 → 셀 편집
      openCellEditor();
    }
    return;
  }
  if (state.view === 'tabs') {
    toast('시트를 선택하세요');
  }
}

  const colIdx = state.colCursor;
  const type = tab.columnTypes[colIdx];

  state.view = 'editor';

  };

}

function deleteCurrentCol() {
const tab = currentTab();
const colIdx = state.editor.colIdx;
if (colIdx === 0) { toast(‘라벨 열은 삭제 불가’); return; }
const header = tab.headers[colIdx];

tab.headers.splice(colIdx, 1);
tab.columnTypes.splice(colIdx, 1);

const newOpts = {};
Object.keys(tab.columnOptions).forEach(k => {
const n = Number(k);
if (n < colIdx) newOpts[n] = tab.columnOptions[n];
else if (n > colIdx) newOpts[n - 1] = tab.columnOptions[n];
});
tab.columnOptions = newOpts;

tab.rows.forEach(r => r.cells.splice(colIdx, 1));
if (state.colCursor >= tab.headers.length) state.colCursor = tab.headers.length - 1;
if (state.colCursor < 0) state.colCursor = 0;

markDirty();
state.editor = null;
toast(‘열 삭제됨’);
goSheet(state.currentTabIdx, ‘backward’);
}

if (!currentView) return;

lis.forEach((li, i) => li.classList.toggle(‘active’, i === cur));

ul.style.transform = ‘translateY(’ + (-anchor * liH) + ‘px)’;
}

}
let toastTimer;
function toast(msg) {
toastEl.textContent = msg;
toastEl.classList.add(‘show’);
clearTimeout(toastTimer);
toastTimer = setTimeout(() => toastEl.classList.remove(‘show’), 2000);
}

// ====== 이동 ======
function moveRow(delta) {
if (state.view === ‘tabs’) {
const max = (workbook?.tabs.length || 0) - 1;
state.rowCursor = Math.max(0, Math.min(max, state.rowCursor + delta));
applyListCursor();
} else if (state.view === ‘sheet’) {
const tab = currentTab();
if (!tab) return;
const min = -1;  // 헤더
const max = tab.rows.length;  // +행
state.rowCursor = Math.max(min, Math.min(max, state.rowCursor + delta));
applyCellCursor(); scrollActiveIntoView();
} else if (state.view === ‘bigview’) {
// 크게 보기 상태에서도 이동 → 이동 후 크게 보기 갱신
const tab = currentTab();
if (!tab) return;
// +행은 건너뛰기 (크게 볼 내용 없음)
const max = tab.rows.length - 1;
const min = -1;  // 헤더 포함
let next = state.rowCursor + delta;
if (next < min) next = min;
if (next > max) next = max;
if (next === state.rowCursor) return;
state.rowCursor = next;
refreshBigView();
}
}
function moveCol(delta) {
if (state.view === ‘sheet’) {
const tab = currentTab();
if (!tab) return;
const max = tab.headers.length;  // +열
state.colCursor = Math.max(0, Math.min(max, state.colCursor + delta));
applyCellCursor(); scrollActiveIntoView();
} else if (state.view === ‘bigview’) {
const tab = currentTab();
if (!tab) return;
// +열은 건너뛰기
const max = tab.headers.length - 1;
let next = state.colCursor + delta;
if (next < 0) next = 0;
if (next > max) next = max;
if (next === state.colCursor) return;
state.colCursor = next;
refreshBigView();
}
}

function refreshBigView() {
if (state.rowCursor === -1) showBigViewForHeader();
else showBigViewForCell();
}

let dragging = false, lastAngle = 0, accumAngle = 0;
const DEG_PER_ITEM = 22;

function angleFromEvent(e) {
const r = wheel.getBoundingClientRect();
return Math.atan2(e.clientY - (r.top + r.height/2),
e.clientX - (r.left + r.width/2)) * 180 / Math.PI;
}

wheel.addEventListener(‘pointerdown’, (e) => {
if (e.target.closest(’.center-btn’) || e.target.closest(’.arrow’)) return;
dragging = true;
wheel.classList.add(‘dragging’);
wheel.setPointerCapture(e.pointerId);
lastAngle = angleFromEvent(e);
moveFingerLight(e.clientX, e.clientY);
ensureAudio();
});
wheel.addEventListener(‘pointermove’, (e) => {
if (!dragging) return;
const a = angleFromEvent(e);
let d = a - lastAngle;
if (d > 180) d -= 360;
if (d < -180) d += 360;
accumAngle += d;
lastAngle = a;
moveFingerLight(e.clientX, e.clientY);
rotateDisk(d);
while (accumAngle >= DEG_PER_ITEM)  { moveRow(1);  accumAngle -= DEG_PER_ITEM; tickFeedback(); }
while (accumAngle <= -DEG_PER_ITEM) { moveRow(-1); accumAngle += DEG_PER_ITEM; tickFeedback(); }
});
function endDrag() { if (!dragging) return; dragging = false; wheel.classList.remove(‘dragging’); accumAngle = 0; }
wheel.addEventListener(‘pointerup’, endDrag);
wheel.addEventListener(‘pointercancel’, endDrag);
wheel.addEventListener(‘wheel’, (e) => {
e.preventDefault();
ensureAudio();
moveRow(e.deltaY > 0 ? 1 : -1);
tickFeedback();
}, { passive: false });

// ====== 버튼 ======
function handleMenu() {
if (document.getElementById(‘dlModal’).classList.contains(‘show’)) return closeDownload();
if (state.view === ‘editor’)       editorCancel();
else if (state.view === ‘bigview’) goSheet(state.currentTabIdx, ‘backward’);
else if (state.view === ‘sheet’)   goTabs();
else if (state.view === ‘tabs’)    showStart();
}
function handleCenter() {
ensureAudio();
if (state.view === ‘tabs’)       goSheet(state.rowCursor);
else if (state.view === ‘sheet’) onCenterPress();
else if (state.view === ‘bigview’) goSheet(state.currentTabIdx, ‘backward’); // 한번 더 누르면 닫힘
}

document.getElementById(‘btnMenu’).addEventListener(‘click’, handleMenu);
document.getElementById(‘btnEdit’).addEventListener(‘click’, onEditPress);
document.getElementById(‘centerBtn’).addEventListener(‘click’, handleCenter);
document.getElementById(‘btnUp’).addEventListener(‘click’, () => { moveRow(-1); tickFeedback(); });
document.getElementById(‘btnDown’).addEventListener(‘click’, () => { moveRow(1); tickFeedback(); });
document.getElementById(‘btnLeft’).addEventListener(‘click’, () => { moveCol(-1); tickFeedback(); });
document.getElementById(‘btnRight’).addEventListener(‘click’, () => { moveCol(1); tickFeedback(); });
document.getElementById(‘btnSave’).addEventListener(‘click’, () => {
if (!workbook) return;
saveLocal(); dirty = false; updateDirty(); toast(‘저장됨’);
});
document.getElementById(‘btnExport’).addEventListener(‘click’, buildAndExport);

document.addEventListener(‘change’, (e) => {
if (e.target?.id === ‘openFile’) onFileOpen(e);
});
document.addEventListener(‘keydown’, (e) => {
const isTyping = e.target.tagName === ‘TEXTAREA’ || e.target.tagName === ‘INPUT’;
if (isTyping) return;
if (e.key === ‘ArrowDown’)       { moveRow(1);  tickFeedback(); }
else if (e.key === ‘ArrowUp’)    { moveRow(-1); tickFeedback(); }
else if (e.key === ‘ArrowLeft’)  { moveCol(-1); tickFeedback(); }
else if (e.key === ‘ArrowRight’) { moveCol(1);  tickFeedback(); }
else if (e.key === ‘Enter’)      handleCenter();
else if (e.key === ‘e’ || e.key === ‘E’) onEditPress();
else if (e.key === ‘Escape’ || e.key === ‘Backspace’) handleMenu();
else if ((e.ctrlKey || e.metaKey) && e.key === ‘s’) { e.preventDefault(); document.getElementById(‘btnSave’).click(); }
});
window.addEventListener(‘beforeunload’, (e) => { if (dirty) { e.preventDefault(); e.returnValue = ‘’; } });

start();
</script>
