<!doctype html>

<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>iPod × Local Excel</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
  :root {
    --bg: #d9d5cc;
    --body-edge: #c9c4b8;
    --screen: #cfd7c7;
    --screen-2: #b9c3ac;
    --wheel-edge: #b9b4a8;
    --bar-color: #2e55a8;
    --anim-dur: 280ms;
    --anim-ease: cubic-bezier(.22,.8,.25,1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(1000px 700px at 50% 20%, #e7e3d8 0%, transparent 60%),
      var(--bg);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

.ipod { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 12px 10px 10px; gap: 8px; }
.ipod-body {
flex: 1;
background: linear-gradient(180deg, #fbf9f4 0%, #eae6dc 100%);
border-radius: 28px;
padding: 14px 14px 10px;
box-shadow:
inset 0 1px 0 rgba(255,255,255,.9),
inset 0 -2px 0 rgba(0,0,0,.06),
0 12px 30px rgba(30,30,30,.2),
0 0 0 1px var(–body-edge);
display: flex; flex-direction: column; min-height: 0;
}
.screen {
flex: 1; min-height: 0;
border-radius: 6px;
background: linear-gradient(180deg, var(–screen) 0%, var(–screen-2) 100%);
box-shadow:
inset 0 2px 6px rgba(0,0,0,.25),
inset 0 -1px 0 rgba(255,255,255,.3),
0 0 0 4px #1a1a1a, 0 0 0 5px #3a3a3a;
overflow: hidden; position: relative;
}
.titlebar {
height: 26px;
background: linear-gradient(180deg, #4a77c9, var(–bar-color));
color: #fff;
display: flex; align-items: center; justify-content: center;
padding: 0 10px; font-size: 13px; font-weight: 700; position: relative;
flex-shrink: 0;
}
.titlebar::before {
content: “”; position: absolute; inset: 0 0 auto 0; height: 45%;
background: linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0));
}
.titlebar .t-text { position: relative; z-index: 1; }

.view-stack { position: absolute; top: 26px; bottom: 0; left: 0; right: 0; overflow: hidden; }
.view {
position: absolute; inset: 0;
background: linear-gradient(180deg, var(–screen) 0%, var(–screen-2) 100%);
overflow: hidden;
transition: transform var(–anim-dur) var(–anim-ease);
will-change: transform;
}
.view.slide-in-right  { transform: translateX(100%); }
.view.slide-in-left   { transform: translateX(-100%); }
.view.slide-out-left  { transform: translateX(-100%); }
.view.slide-out-right { transform: translateX(100%); }
.view.show            { transform: translateX(0); }

/* 리스트 (탭 선택) */
.list { position: absolute; inset: 0; overflow: hidden; }
.list ul { list-style: none; margin: 0; padding: 0; transition: transform .18s cubic-bezier(.2,.8,.2,1); }
.list li {
padding: 6px 12px;
font-size: 15px; line-height: 1.2;
border-bottom: 1px solid rgba(0,0,0,.06);
display: flex; align-items: center; gap: 10px;
min-height: 44px;
}
.list li .label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list li .meta { color: #555; font-size: 12px; flex-shrink: 0; }
.list li .chev { color: #555; font-size: 14px; }
.list li.active {
background: linear-gradient(180deg, #4a77c9, var(–bar-color));
color: #fff;
}
.list li.active .meta, .list li.active .chev { color: rgba(255,255,255,.95); }

/* 스프레드시트 그리드 */
.sheet-view {
position: absolute; inset: 0;
overflow: auto;
font-size: 12px;
-webkit-overflow-scrolling: touch;
}
.sheet-view table {
border-collapse: separate;
border-spacing: 0;
width: max-content;
min-width: 100%;
}
.sheet-view th, .sheet-view td {
border-right: 1px solid rgba(0,0,0,.1);
border-bottom: 1px solid rgba(0,0,0,.08);
padding: 6px 8px;
min-width: 92px;
max-width: 160px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
vertical-align: middle;
}
.sheet-view th {
background: linear-gradient(180deg, #4a77c9, var(–bar-color));
color: #fff;
font-weight: 700;
font-size: 11px;
text-align: left;
position: sticky;
top: 0;
z-index: 3;
}
.sheet-view th.row-head,
.sheet-view td.row-head {
background: #e4e1d7;
position: sticky;
left: 0;
z-index: 2;
font-weight: 600;
color: #333;
min-width: 70px;
max-width: 110px;
}
.sheet-view th.row-head { z-index: 4; }
.sheet-view td.cell-img {
padding: 3px;
}
.sheet-view td.cell-img .thumb {
width: 30px; height: 30px; border-radius: 4px;
background: rgba(0,0,0,.08) center/cover no-repeat;
border: 1px solid rgba(0,0,0,.15);
display: inline-block;
}
.sheet-view td.empty-cell { color: #bbb; font-style: italic; }
.sheet-view td.active {
background: rgba(74,119,201,.25);
outline: 2px solid var(–bar-color);
outline-offset: -2px;
}
.sheet-view td.row-head.active-row { background: #c9c6ba; }

/* 편집 화면 */
.editor {
position: absolute; inset: 0;
overflow-y: auto;
padding: 14px;
-webkit-overflow-scrolling: touch;
}
.editor .ed-label {
font-size: 11px; color: #666; text-transform: uppercase;
letter-spacing: .1em; margin-bottom: 4px;
}
.editor .ed-rowname {
font-size: 18px; font-weight: 700; margin-bottom: 14px;
color: #222;
}
.editor .ed-field {
font-size: 13px; color: #555; margin: 10px 0 6px;
display: flex; align-items: center; gap: 6px;
}
.editor .ed-field .badge {
font-size: 10px; padding: 1px 6px; border-radius: 10px;
background: #e4e1d7; color: #555;
}
.editor .options-row {
display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
}
.editor .options-row .opt {
background: #fff; border: 1px solid #cfcbbf;
border-radius: 14px; padding: 5px 12px; font-size: 13px;
cursor: pointer;
}
.editor .options-row .opt.selected {
background: var(–bar-color); color: #fff; border-color: var(–bar-color);
}
.editor textarea.ed-input {
width: 100%;
min-height: 64px;
padding: 8px 10px;
border: 1px solid #c9c4b8;
border-radius: 6px;
font-family: inherit;
font-size: 14px;
background: #fff;
resize: vertical;
}
.editor textarea.ed-input:focus {
outline: 2px solid var(–bar-color);
outline-offset: -1px;
}
.editor .img-block {
background: #fff;
border: 1px dashed #c9c4b8;
border-radius: 8px;
padding: 10px;
text-align: center;
display: flex;
flex-direction: column;
gap: 8px;
align-items: center;
}
.editor .img-block img {
max-width: 100%; max-height: 160px;
border-radius: 6px;
}
.editor .img-block .btns { display: flex; gap: 6px; }
.editor .img-block button, .editor .img-block label {
background: var(–bar-color); color: #fff;
border: none; border-radius: 5px;
padding: 5px 12px; font-size: 12px; cursor: pointer;
}
.editor .img-block button.del { background: #c44; }
.editor .img-block input[type=file] { display: none; }

.editor-actions {
position: sticky;
bottom: 0;
display: flex; gap: 8px;
padding: 10px 0 0;
background: linear-gradient(180deg, rgba(207,215,199,0) 0%, var(–screen) 30%);
}
.editor-actions button {
flex: 1; padding: 10px;
border: none; border-radius: 8px;
font-size: 14px; font-weight: 700; letter-spacing: .04em;
cursor: pointer;
}
.editor-actions .cancel { background: #ddd7c8; color: #333; }
.editor-actions .save   { background: var(–bar-color); color: #fff; }

.empty { padding: 24px 18px; font-size: 14px; color: #333; text-align: center; line-height: 1.6; }
.empty .big { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
.empty button, .empty label.btn {
display: inline-block; margin: 8px 4px 0;
background: var(–bar-color); color: #fff; border: none;
padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
}
.empty label.btn.ghost { background: transparent; color: var(–bar-color); border: 1px solid var(–bar-color); }
.empty label.btn.danger { background: transparent; color: #c44; border: 1px solid #c44; font-size: 12px; }
.empty input[type=file] { display: none; }

.dlmodal {
position: absolute; inset: 26px 0 0 0;
background: rgba(0,0,0,.9);
display: none; align-items: center; justify-content: center;
flex-direction: column; gap: 12px; padding: 20px; z-index: 100;
}
.dlmodal.show { display: flex; }
.dlmodal p { color: #fff; font-size: 13px; text-align: center; margin: 0; line-height: 1.5; }
.dlmodal a.dlbtn { background: var(–bar-color); color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
.dlmodal button { background: transparent; color: #ccc; border: 1px solid #555; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }

.toast {
position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
background: rgba(0,0,0,.8); color: #fff; font-size: 13px;
padding: 8px 14px; border-radius: 16px; opacity: 0; transition: opacity .2s;
pointer-events: none; white-space: nowrap; z-index: 200;
max-width: 80%; text-align: center;
}
.toast.show { opacity: 1; }

.wheel-wrap { display: flex; align-items: center; justify-content: center; padding-top: 12px; flex-shrink: 0; }
.wheel {
width: min(58%, 240px); aspect-ratio: 1/1; border-radius: 50%;
position: relative;
background: radial-gradient(circle at 50% 40%, #f4f1ea 0%, #dcd8ce 70%, #c9c4b8 100%);
box-shadow:
inset 0 2px 4px rgba(255,255,255,.8),
inset 0 -6px 14px rgba(0,0,0,.12),
0 2px 6px rgba(0,0,0,.15),
0 0 0 1px var(–wheel-edge);
cursor: grab; touch-action: none; overflow: hidden;
}
.wheel::before {
content: “”; position: absolute; inset: 6%; border-radius: 50%;
background: repeating-conic-gradient(
from 0deg,
rgba(0,0,0,0) 0deg, rgba(0,0,0,0) 3deg,
rgba(0,0,0,.04) 3deg, rgba(0,0,0,.04) 3.5deg
);
transform: rotate(var(–rot, 0deg));
transition: transform .08s linear;
pointer-events: none;
}
.wheel.dragging { cursor: grabbing; }
.wheel .tickmark {
position: absolute; top: 3%; left: 50%;
width: 3px; height: 7px; background: #4a77c9;
border-radius: 2px; transform: translateX(-50%);
opacity: 0; pointer-events: none;
}
.wheel .tickmark.flash { opacity: 1; box-shadow: 0 0 8px #4a77c9; transition: opacity .05s ease-out; }
.wheel .tickmark.fade  { opacity: 0; transition: opacity .3s ease; }
.wheel .fingerLight {
position: absolute;
width: 42px; height: 42px; border-radius: 50%;
background: radial-gradient(circle,
rgba(74,119,201,.4) 0%, rgba(74,119,201,.15) 40%, transparent 70%);
transform: translate(-50%, -50%) scale(0);
transition: transform .2s ease, opacity .2s ease;
opacity: 0; pointer-events: none; mix-blend-mode: multiply;
}
.wheel.dragging .fingerLight { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.tag { position: absolute; font-weight: 700; color: #4a4a4a; letter-spacing: .06em; cursor: pointer; font-size: 11px; z-index: 2; }
.tag.menu { top: 8%; left: 50%; transform: translateX(-50%); }
.tag.prev { top: 50%; left: 8%;  transform: translateY(-50%); font-size: 14px; }
.tag.next { top: 50%; right: 8%; transform: translateY(-50%); font-size: 14px; }
.tag.play { bottom: 8%; left: 50%; transform: translateX(-50%); }
.center-btn {
position: absolute; top: 50%; left: 50%;
width: 38%; height: 38%;
transform: translate(-50%, -50%);
border: none; border-radius: 50%;
background: radial-gradient(circle at 50% 35%, #ffffff 0%, #e8e4da 75%);
box-shadow:
inset 0 1px 0 rgba(255,255,255,.9),
inset 0 -4px 10px rgba(0,0,0,.08),
0 1px 3px rgba(0,0,0,.15),
0 0 0 1px var(–wheel-edge);
cursor: pointer; z-index: 3;
}
.center-btn:active { box-shadow: inset 0 2px 4px rgba(0,0,0,.12), 0 0 0 1px var(–wheel-edge); }

.btn-panel {
display: flex; gap: 10px;
padding: 12px 14px 14px;
background: linear-gradient(180deg, #eae6dc 0%, #ddd9d0 100%);
border-radius: 18px;
box-shadow: 0 10px 24px rgba(30,30,30,.18), 0 0 0 1px var(–body-edge);
flex-shrink: 0;
}
.btn-panel button {
flex: 1; padding: 12px 0;
border: none; border-radius: 12px;
font-size: 13px; font-weight: 700; letter-spacing: .08em;
cursor: pointer; position: relative;
box-shadow: inset 0 1px 0 rgba(255,255,255,.7), 0 2px 4px rgba(0,0,0,.15);
transition: transform .08s, box-shadow .08s;
}
.btn-panel button:active { transform: translateY(1px); box-shadow: inset 0 2px 3px rgba(0,0,0,.15); }
.btn-save   { background: linear-gradient(180deg, #f0eee8 0%, #dbd7ce 100%); color: #3a3a3a; }
.btn-export { background: linear-gradient(180deg, #4a77c9 0%, var(–bar-color) 100%); color: #fff;
box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 2px 4px rgba(46,85,168,.4) !important; }
.btn-panel .dot {
position: absolute; top: 7px; right: 8px;
width: 7px; height: 7px; border-radius: 50%;
background: #ff9d5a; box-shadow: 0 0 4px rgba(255,180,80,.8);
}
.btn-panel .dot.clean { background: #a0e878; box-shadow: 0 0 4px rgba(160,230,120,.8); }

@media (orientation: landscape) and (max-height: 500px) {
.ipod { flex-direction: row; padding: 8px; }
.ipod-body { flex: 1.5; }
.btn-panel { flex-direction: column; min-width: 100px; }
}
</style>

<script>
window.addEventListener('error', (e) => {
  console.error(e);
  toast('에러: ' + (e.message || '').slice(0, 60));
});
window.addEventListener('unhandledrejection', (e) => {
  console.error(e);
  toast('에러: ' + String(e.reason).slice(0, 60));
});

const LS_KEY = 'ipod-wb-v4';
const LS_FILENAME = 'ipod-filename-v4';
const IMG_HEADER_PATTERN = /^(사진|image|photo|img|이미지)/i;

let workbook = null;
let fileName = localStorage.getItem(LS_FILENAME) || 'ipod-data.xlsx';
let dirty = false;

// view: 'init' | 'tabs' | 'sheet' | 'editor'
const state = {
  view: 'init',
  currentTabIdx: -1,
  rowCursor: 0,
  colCursor: 1,   // 0 = A열(라벨, 선택 불가), 1부터가 편집 가능한 B열
  editor: null,   // 편집 중인 임시 값 { value, image }
};

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// ====== 오디오/피드백 ======
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx?.state === 'suspended') audioCtx.resume();
}
function playTick() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(2200, now);
  osc.frequency.exponentialRampToValueAtTime(800, now + 0.02);
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.04);
}
const tickEl = document.getElementById('tickmark');
let tickTimer;
function flashTick() {
  tickEl.classList.remove('fade'); tickEl.classList.add('flash');
  clearTimeout(tickTimer);
  tickTimer = setTimeout(() => { tickEl.classList.remove('flash'); tickEl.classList.add('fade'); }, 60);
}
function tickFeedback() { playTick(); flashTick(); try { navigator.vibrate && navigator.vibrate(4); } catch(e) {} }

const wheel = document.getElementById('wheel');
const fingerLight = document.getElementById('fingerLight');
let diskRot = 0;
function moveFingerLight(cx, cy) {
  const r = wheel.getBoundingClientRect();
  fingerLight.style.left = (cx - r.left) + 'px';
  fingerLight.style.top  = (cy - r.top)  + 'px';
}
function rotateDisk(deg) { diskRot += deg; wheel.style.setProperty('--rot', diskRot + 'deg'); }

// ====== 뷰 스택 ======
const viewStack = document.getElementById('viewStack');
let currentView = null;
let animating = false;
const ANIM_DUR = 280;

function createView(htmlContent) {
  const v = document.createElement('div');
  v.className = 'view';
  v.innerHTML = htmlContent;
  return v;
}
function transitionTo(newView, direction) {
  direction = direction || 'forward';
  if (animating && currentView) currentView.remove();
  animating = true;
  const old = currentView;
  currentView = newView;
  if (direction === 'forward') newView.classList.add('slide-in-right');
  else newView.classList.add('slide-in-left');
  viewStack.appendChild(newView);
  void newView.offsetWidth;
  newView.classList.remove('slide-in-right', 'slide-in-left');
  newView.classList.add('show');
  if (old) {
    old.classList.remove('show');
    if (direction === 'forward') old.classList.add('slide-out-left');
    else old.classList.add('slide-out-right');
  }
  setTimeout(() => { if (old) old.remove(); animating = false; }, ANIM_DUR);
}
function setFirstView(newView) {
  if (currentView) currentView.remove();
  currentView = newView;
  newView.classList.add('show');
  viewStack.appendChild(newView);
}

// ====== 시작 ======
function start() {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) {
    try { workbook = JSON.parse(saved); dirty = false; updateDirty(); goTabs(true); return; }
    catch(e) {}
  }
  showStart();
}
function showStart() {
  state.view = 'init';
  setTitle('iPod');
  const hasBackup = !!localStorage.getItem(LS_KEY);
  let html = '<div class="empty">';
  html += '<div class="big">엑셀 파일로 시작</div>';
  html += '<div>A열=라벨(읽기전용)<br>B열부터=편집 가능한 데이터<br>헤더명에 "사진/image" 포함 → 이미지 컬럼<br>_options 시트로 옵션 정의</div>';
  html += '<label class="btn">파일 열기<input type="file" id="openFile" accept=".xlsx,.xls"/></label>';
  html += '<button class="btn ghost" onclick="createNew()">새로 만들기</button>';
  if (hasBackup) html += '<br><button class="btn danger" onclick="resetAll()">저장 데이터 삭제</button>';
  html += '</div>';
  const v = createView(html);
  if (currentView) transitionTo(v, 'backward');
  else setFirstView(v);
  setTimeout(() => {
    const inp = v.querySelector('#openFile');
    if (inp) inp.addEventListener('change', onFileOpen);
  }, 50);
}

async function onFileOpen(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  fileName = file.name;
  localStorage.setItem(LS_FILENAME, fileName);
  try {
    toast('파일 읽는 중...');
    const ab = await file.arrayBuffer();
    workbook = await parseWorkbook(ab);
    dirty = false;
    saveLocal();
    updateDirty();
    toast(workbook.tabs.length + '개 탭 로드됨');
    goTabs();
  } catch(err) { console.error(err); toast('파일 읽기 실패: ' + err.message); }
}

function createNew() {
  workbook = {
    tabs: [{
      title: 'Sheet1',
      headers: ['호수', '상태', '사진', '메모'],
      columnTypes: ['label', 'text', 'image', 'text'],
      columnOptions: { 1: ['청소완료','점검필요','공실'] },  // col 1 (상태) 에 옵션
      rows: [
        { cells: ['201호', '', '', ''] },
        { cells: ['202호', '', '', ''] },
        { cells: ['203호', '', '', ''] },
      ]
    }]
  };
  fileName = 'ipod-data.xlsx';
  localStorage.setItem(LS_FILENAME, fileName);
  dirty = true;
  saveLocal();
  updateDirty();
  goTabs();
}

function resetAll() {

// ============================================================
// 파싱
// ============================================================
async function parseWorkbook(arrayBuffer) {
  const wb = new ExcelJS.Workbook();
  await wb.xlsx.load(arrayBuffer);

  // _options 시트부터 파싱: { "시트명::헤더명": [옵션배열] }
  const optionsMap = {};
  const optSheet = wb.getWorksheet('_options');
  if (optSheet) {
    const last = optSheet.rowCount;
    for (let r = 2; r <= last; r++) {
      const row = optSheet.getRow(r);
      const sheetName = cellText(row.getCell(1));
      const header    = cellText(row.getCell(2));
      const optsStr   = cellText(row.getCell(3));
      if (!sheetName || !header || !optsStr) continue;
      const opts = optsStr.split(',').map(s => s.trim()).filter(s => s !== '');
      optionsMap[sheetName + '::' + header] = opts;
    }
  }

  const tabs = [];
  wb.eachSheet((sheet) => {
    if (sheet.name === '_options') return;

    // 이미지 수집
    const imagesByPos = {};  // "row:col" -> dataUrl (1-index)
    try {
      const imgList = sheet.getImages() || [];
      imgList.forEach((img) => {
        const rowNum = (img.range?.tl?.nativeRow ?? 0) + 1;
        const colNum = (img.range?.tl?.nativeCol ?? 0) + 1;
        const media = wb.model.media.find(m => m.index === img.imageId);
        if (!media) return;
        const dataUrl = mediaToDataUrl(media);
        if (dataUrl) imagesByPos[rowNum + ':' + colNum] = dataUrl;
      });
    } catch(e) { console.warn('이미지 파싱 실패', e); }

    // 1행 = 헤더
    const headerRow = sheet.getRow(1);
    const headers = [];
    // 끝 열 추정
    let lastCol = sheet.columnCount || 1;
    for (let c = 1; c <= lastCol; c++) {
      headers.push(cellText(headerRow.getCell(c)));
    }
    // 뒤쪽 빈 헤더 잘라내기
    while (headers.length && !headers[headers.length - 1]) headers.pop();
    if (!headers.length) headers.push('A');

    // 컬럼 타입 결정
    const columnTypes = headers.map((h, i) => {
      if (i === 0) return 'label';              // A열은 라벨
      if (IMG_HEADER_PATTERN.test(h)) return 'image';
      return 'text';
    });

    // 컬럼별 옵션
    const columnOptions = {};
    headers.forEach((h, i) => {
      const key = sheet.name + '::' + h;
      if (optionsMap[key]) columnOptions[i] = optionsMap[key];
    });

    // 데이터 행
    const rows = [];
    const lastRow = sheet.rowCount;
    for (let r = 2; r <= lastRow; r++) {
      const row = sheet.getRow(r);
      const cells = [];
      let hasContent = false;
      for (let c = 1; c <= headers.length; c++) {
        if (columnTypes[c - 1] === 'image') {
          const img = imagesByPos[r + ':' + c] || '';
          cells.push(img);
          if (img) hasContent = true;
        } else {
          const t = cellText(row.getCell(c));
          cells.push(t);
          if (t) hasContent = true;
        }
      }
      if (!hasContent && !cells[0]) continue;  // 완전 빈 행 skip
      rows.push({ cells });
    }

    tabs.push({
      title: sheet.name,
      headers,
      columnTypes,
      columnOptions,
      rows
    });
  });

  if (!tabs.length) {
    tabs.push({
      title: 'Sheet1',
      headers: ['라벨', '값'],
      columnTypes: ['label', 'text'],
      columnOptions: {},
      rows: []
    });
  }
  return { tabs };
}

function cellText(cell) {
  const v = cell?.value;
  if (v == null) return '';
  if (typeof v === 'object') {
    if (v.richText) return v.richText.map(t => t.text).join('').trim();
    if (v.result != null) return String(v.result).trim();
    if (v.text != null) return String(v.text).trim();
    if (v.hyperlink && v.text) return String(v.text).trim();
    return '';
  }
  return String(v).trim();
}

function mediaToDataUrl(media) {
  try {
    const ext = (media.extension || 'png').toLowerCase();
    const mime = ext === 'jpg' || ext === 'jpeg' ? 'image/jpeg'
               : ext === 'png' ? 'image/png'
               : ext === 'gif' ? 'image/gif'
               : 'image/png';
    let base64 = '';
    if (media.buffer) {
      const bytes = new Uint8Array(media.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      base64 = btoa(binary);
    } else if (media.base64) base64 = media.base64;
    else return '';
    return 'data:' + mime + ';base64,' + base64;
  } catch(e) { return ''; }
}

// ============================================================
// Export
// ============================================================
async function buildAndExport() {
  if (!workbook) return;
  try {
    toast('Export 중...');
    const wb = new ExcelJS.Workbook();

    // 옵션 숨김 시트
    const optsAoa = [['sheet', 'header', 'options']];
    workbook.tabs.forEach(tab => {
      Object.keys(tab.columnOptions || {}).forEach(colIdx => {
        const header = tab.headers[Number(colIdx)];
        const opts = tab.columnOptions[colIdx];
        if (header && opts?.length) {
          optsAoa.push([tab.title, header, opts.join(', ')]);
        }
      });
    });

    for (const tab of workbook.tabs) {
      const ws = wb.addWorksheet(tab.title);

      // 헤더
      ws.addRow(tab.headers);
      const hasImgCol = tab.columnTypes.some(t => t === 'image');

      // 열 너비
      tab.headers.forEach((h, i) => {
        const col = ws.getColumn(i + 1);
        col.width = tab.columnTypes[i] === 'image' ? 12 : Math.max(10, h.length + 4);
      });

      // 데이터 행
      tab.rows.forEach((r, i) => {
        const rowData = r.cells.map((v, c) => tab.columnTypes[c] === 'image' ? '' : v);
        const row = ws.addRow(rowData);
        if (hasImgCol) row.height = 60;

        // 이미지 삽입
        r.cells.forEach((v, c) => {
          if (tab.columnTypes[c] !== 'image' || !v) return;
          const imgInfo = dataUrlToBuffer(v);
          if (!imgInfo) return;
          const imageId = wb.addImage({ buffer: imgInfo.buffer, extension: imgInfo.ext });
          ws.addImage(imageId, {
            tl: { col: c, row: i + 1 },  // 0-index; i+1 = 헤더 다음 행
            ext: { width: 75, height: 75 }
          });
        });
      });

      // 헤더 스타일
      const hr = ws.getRow(1);
      hr.font = { bold: true };
      hr.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE8E8E8' } };
    }

    // _options 숨김 시트
    if (optsAoa.length > 1) {
      const optWs = wb.addWorksheet('_options', { state: 'hidden' });
      optsAoa.forEach(r => optWs.addRow(r));
      optWs.getRow(1).font = { bold: true };
    }

    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    });
    const fname = fileName || 'ipod-data.xlsx';

    if (navigator.share && navigator.canShare) {
      const sf = new File([blob], fname, { type: blob.type });
      if (navigator.canShare({ files: [sf] })) {
        navigator.share({ files: [sf], title: fname })
          .then(() => toast('공유됨'))
          .catch(err => { if (err.name !== 'AbortError') fallbackDownload(blob, fname); });
        return;
      }
    }
    fallbackDownload(blob, fname);
  } catch(err) { console.error(err); toast('Export 실패: ' + String(err.message).slice(0, 50)); }
}

function dataUrlToBuffer(dataUrl) {
  try {
    const m = dataUrl.match(/^data:image\/(\w+);base64,(.+)$/);
    if (!m) return null;
    const ext = m[1] === 'jpg' ? 'jpeg' : m[1];
    const binary = atob(m[2]);
    const buffer = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) buffer[i] = binary.charCodeAt(i);
    return { buffer, ext };
  } catch(e) { return null; }
}

function fallbackDownload(blob, fname) {
  const url = URL.createObjectURL(blob);
  if (isIOS) {
    const link = document.getElementById('dlLink');
    link.href = url; link.download = fname;
    document.getElementById('dlMsg').innerHTML = '<b>' + esc(fname) + '</b><br>버튼을 <b>길게 눌러</b> 다운로드';
    document.getElementById('dlModal').classList.add('show');
  } else {
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    toast('Export 완료');
  }
}
function closeDownload() { document.getElementById('dlModal').classList.remove('show'); }

function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(workbook)); }
  catch(e) { toast('저장 용량 초과'); }
}

// ====== 이미지 리사이즈 ======
async function resizeImage(file, maxDim, quality) {
  maxDim = maxDim || 800;
  quality = quality || 0.8;
  const dataUrl = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = () => rej(new Error('read fail'));
    fr.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const image = new Image();
    image.onload = () => res(image);
    image.onerror = () => rej(new Error('image load fail'));
    image.src = dataUrl;
  });
  let { width, height } = img;
  const scale = Math.min(1, maxDim / Math.max(width, height));
  width = Math.round(width * scale); height = Math.round(height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  canvas.getContext('2d').drawImage(img, 0, 0, width, height);
  return canvas.toDataURL('image/jpeg', quality);
}

// ====== 뷰: 탭 목록 ======
function goTabs(initial) {
  const wasDeeper = (state.view === 'sheet' || state.view === 'editor');
  state.view = 'tabs';
  state.rowCursor = 0;
  setTitle(fileName.replace(/\.xlsx?$/,'').slice(0,24) || 'iPod');

  if (!workbook || !workbook.tabs.length) { showEmptyView('탭이 없어요.', wasDeeper ? 'backward' : 'forward'); return; }

  let html = '<div class="list"><ul>';
  workbook.tabs.forEach((t, i) => {
    html += '<li data-idx="' + i + '" class="' + (i === state.rowCursor ? 'active' : '') + '">';
    html += '<span class="label">' + esc(t.title) + '</span>';
    html += '<span class="meta">' + t.rows.length + '행 × ' + t.headers.length + '열</span>';
    html += '<span class="chev">›</span>';
    html += '</li>';
  });
  html += '</ul></div>';

  const v = createView(html);
  if (initial) setFirstView(v); else transitionTo(v, wasDeeper ? 'backward' : 'forward');
  setTimeout(applyListCursor, ANIM_DUR + 20);
}

// ====== 뷰: 스프레드시트 ======
function goSheet(idx, direction) {
  direction = direction || 'forward';
  state.view = 'sheet';
  state.currentTabIdx = idx;
  state.rowCursor = 0;
  const tab = workbook.tabs[idx];
  // 첫 편집 가능 열로 커서 (0번은 label이므로 1부터)
  state.colCursor = Math.min(1, tab.headers.length - 1);
  setTitle(tab.title.slice(0, 24));

  if (!tab.rows.length) { showEmptyView('행이 없어요.', direction); return; }

  const html = renderSheetHtml(tab);
  const v = createView(html);
  transitionTo(v, direction);
  setTimeout(() => {
    applyCellCursor();
    scrollActiveIntoView();
  }, ANIM_DUR + 20);
}

function renderSheetHtml(tab) {
  let html = '<div class="sheet-view"><table>';
  // 헤더
  html += '<thead><tr>';
  tab.headers.forEach((h, i) => {
    const cls = i === 0 ? 'row-head' : '';
    html += '<th class="' + cls + '">' + esc(h || ('col' + (i+1))) + '</th>';
  });
  html += '</tr></thead><tbody>';

  tab.rows.forEach((r, rIdx) => {
    html += '<tr data-row="' + rIdx + '">';
    r.cells.forEach((v, cIdx) => {
      const type = tab.columnTypes[cIdx];
      if (type === 'label') {
        html += '<td class="row-head" data-row="' + rIdx + '" data-col="' + cIdx + '">' + esc(v || '') + '</td>';
      } else if (type === 'image') {
        html += '<td class="cell-img" data-row="' + rIdx + '" data-col="' + cIdx + '">';
        if (v) html += '<span class="thumb" style="background-image:url(&quot;' + v + '&quot;)"></span>';
        html += '</td>';
      } else {
        const shown = v || '';
        html += '<td data-row="' + rIdx + '" data-col="' + cIdx + '" class="' + (shown ? '' : 'empty-cell') + '">';
        html += esc(shown || '—');
        html += '</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function applyCellCursor() {
  if (!currentView) return;
  const table = currentView.querySelector('.sheet-view table');
  if (!table) return;
  table.querySelectorAll('td.active').forEach(el => el.classList.remove('active'));
  table.querySelectorAll('td.active-row').forEach(el => el.classList.remove('active-row'));
  const cell = table.querySelector('td[data-row="' + state.rowCursor + '"][data-col="' + state.colCursor + '"]');
  if (cell) cell.classList.add('active');
  const rowHead = table.querySelector('td.row-head[data-row="' + state.rowCursor + '"]');
  if (rowHead && state.colCursor !== 0) rowHead.classList.add('active-row');
}

function scrollActiveIntoView() {
  if (!currentView) return;
  const cell = currentView.querySelector('td.active');
  if (cell) cell.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
}

// ====== 뷰: 편집 ======
function goEditor() {
  const tab = currentTab();
  if (!tab) return;
  const row = tab.rows[state.rowCursor];
  if (!row) return;
  const colIdx = state.colCursor;
  if (colIdx === 0) { toast('라벨은 편집할 수 없어요'); return; }
  const type = tab.columnTypes[colIdx];

  state.view = 'editor';
  state.editor = {
    value: type === 'image' ? '' : (row.cells[colIdx] || ''),
    image: type === 'image' ? (row.cells[colIdx] || '') : ''
  };

  setTitle('편집');
  renderEditor();
}

function renderEditor() {
  const tab = currentTab();
  const row = tab.rows[state.rowCursor];
  const colIdx = state.colCursor;
  const header = tab.headers[colIdx] || ('col' + (colIdx + 1));
  const type = tab.columnTypes[colIdx];
  const options = tab.columnOptions?.[colIdx] || [];
  const ed = state.editor;

  let html = '<div class="editor">';
  html += '<div class="ed-label">행</div>';
  html += '<div class="ed-rowname">' + esc(row.cells[0] || '—') + '</div>';

  html += '<div class="ed-field">';
  html += '<span>' + esc(header) + '</span>';
  html += '<span class="badge">' + (type === 'image' ? '이미지' : (options.length ? '옵션+텍스트' : '텍스트')) + '</span>';
  html += '</div>';

  if (type === 'image') {
    html += '<div class="img-block">';
    if (ed.image) {
      html += '<img src="' + ed.image + '" alt=""/>';
    } else {
      html += '<div style="color:#999;font-size:13px;padding:20px 0;">사진 없음</div>';
    }
    html += '<div class="btns">';
    html += '<label>' + (ed.image ? '교체' : '사진 추가') + '<input type="file" id="edImgPicker" accept="image/*"/></label>';
    if (ed.image) html += '<button class="del" id="edImgDel">삭제</button>';
    html += '</div></div>';
  } else {
    if (options.length) {
      html += '<div class="options-row" id="edOptions">';
      options.forEach(opt => {
        const sel = opt === ed.value ? 'selected' : '';
        html += '<button class="opt ' + sel + '" data-opt="' + esc(opt) + '">' + esc(opt) + '</button>';
      });
      html += '</div>';
    }
    html += '<textarea class="ed-input" id="edText" rows="3" placeholder="직접 입력하거나 위 옵션 선택">' + esc(ed.value) + '</textarea>';

}

html += ‘<div class="editor-actions">’;
html += ‘<button class="cancel" id="edCancel">취소</button>’;
html += ‘<button class="save" id="edSave">저장</button>’;
html += ‘</div>’;
html += ‘</div>’;

const v = createView(html);
transitionTo(v, ‘forward’);
setTimeout(bindEditorEvents, ANIM_DUR + 20);
}

function bindEditorEvents() {
const v = currentView;
if (!v) return;

const textInput = v.querySelector(’#edText’);
const optsDiv = v.querySelector(’#edOptions’);
const imgPicker = v.querySelector(’#edImgPicker’);
const imgDel = v.querySelector(’#edImgDel’);
const cancelBtn = v.querySelector(’#edCancel’);
const saveBtn = v.querySelector(’#edSave’);

if (textInput) {
textInput.addEventListener(‘input’, () => { state.editor.value = textInput.value; updateOptionSelection(); });
}
if (optsDiv) {
optsDiv.addEventListener(‘click’, (e) => {
const b = e.target.closest(’.opt’);
if (!b) return;
const val = b.dataset.opt;
state.editor.value = val;
if (textInput) textInput.value = val;
updateOptionSelection();
});
}
if (imgPicker) {
imgPicker.addEventListener(‘change’, async (e) => {
const file = e.target.files?.[0];
if (!file) return;
try {
toast(‘이미지 처리 중…’);
const resized = await resizeImage(file, 800, 0.8);
state.editor.image = resized;
renderEditor();
} catch(err) { toast(‘이미지 처리 실패’); }
});
}
if (imgDel) {
imgDel.addEventListener(‘click’, () => {
state.editor.image = ‘’;
renderEditor();
});
}
if (cancelBtn) cancelBtn.addEventListener(‘click’, editorCancel);
if (saveBtn)   saveBtn.addEventListener(‘click’, editorSave);
}

function updateOptionSelection() {
if (!currentView) return;
const btns = currentView.querySelectorAll(’.opt’);
btns.forEach(b => b.classList.toggle(‘selected’, b.dataset.opt === state.editor.value));
}

function editorCancel() {
state.editor = null;
goSheet(state.currentTabIdx, ‘backward’);
}

function editorSave() {
const tab = currentTab();
const row = tab.rows[state.rowCursor];
const colIdx = state.colCursor;
const type = tab.columnTypes[colIdx];
const ed = state.editor;

const newVal = type === ‘image’ ? ed.image : ed.value;
if (row.cells[colIdx] !== newVal) {
row.cells[colIdx] = newVal;
markDirty();
}
state.editor = null;
toast(‘값 설정됨’);
goSheet(state.currentTabIdx, ‘backward’);
}

// ====== 공통 ======
function showEmptyView(msg, direction) {
const v = createView(’<div class="empty">’ + msg + ‘</div>’);
transitionTo(v, direction);
}
function currentTab() { return workbook ? workbook.tabs[state.currentTabIdx] : null; }

const screenTitle = document.getElementById(‘screenTitle’);
const toastEl     = document.getElementById(‘toast’);
function setTitle(t) { screenTitle.textContent = t; }

function applyListCursor() {
if (!currentView) return;
const ul = currentView.querySelector(’.list ul’);
if (!ul) return;
const lis = […ul.querySelectorAll(‘li’)];
const cur = state.rowCursor;
lis.forEach((li, i) => li.classList.toggle(‘active’, i === cur));
if (!lis.length) return;
const liH = lis[0].getBoundingClientRect().height || 44;
const listH = currentView.querySelector(’.list’).getBoundingClientRect().height;
const visible = Math.max(1, Math.floor(listH / liH));
const anchor = Math.min(cur, Math.max(0, lis.length - visible));
ul.style.transform = ‘translateY(’ + (-anchor * liH) + ‘px)’;
}

function esc(s) {
return String(s == null ? ‘’ : s).replace(/[&<>”’]/g, c =>
({’&’:’&’,’<’:’<’,’>’:’>’,’”’:’"’,”’”:’'’}[c]));
}

let toastTimer;
function toast(msg) {
toastEl.textContent = msg;
toastEl.classList.add(‘show’);
clearTimeout(toastTimer);
toastTimer = setTimeout(() => toastEl.classList.remove(‘show’), 2000);
}

// ====== 휠 이벤트 ======
function moveRow(delta) {
if (state.view === ‘tabs’) {
const max = (workbook?.tabs.length || 0) - 1;
state.rowCursor = Math.max(0, Math.min(max, state.rowCursor + delta));
applyListCursor();
} else if (state.view === ‘sheet’) {
const tab = currentTab();
if (!tab) return;
const max = tab.rows.length - 1;
state.rowCursor = Math.max(0, Math.min(max, state.rowCursor + delta));
applyCellCursor();
scrollActiveIntoView();
}
}

function moveCol(delta) {
if (state.view !== ‘sheet’) return;
const tab = currentTab();
if (!tab) return;
const max = tab.headers.length - 1;
let next = state.colCursor + delta;
// 0번(label)은 건너뛰기
if (next <= 0) next = 1;
if (next > max) next = max;
if (next === state.colCursor) return;
state.colCursor = next;
applyCellCursor();
scrollActiveIntoView();
}

let dragging = false, lastAngle = 0, accumAngle = 0;
const DEG_PER_ITEM = 22;

function angleFromEvent(e) {
const r = wheel.getBoundingClientRect();
return Math.atan2(e.clientY - (r.top + r.height/2),
e.clientX - (r.left + r.width/2)) * 180 / Math.PI;
}

wheel.addEventListener(‘pointerdown’, (e) => {
if (e.target.closest(’.center-btn’) || e.target.closest(’.tag’)) return;
dragging = true;
wheel.classList.add(‘dragging’);
wheel.setPointerCapture(e.pointerId);
lastAngle = angleFromEvent(e);
moveFingerLight(e.clientX, e.clientY);
ensureAudio();
});
wheel.addEventListener(‘pointermove’, (e) => {
if (!dragging) return;
const a = angleFromEvent(e);
let d = a - lastAngle;
if (d > 180) d -= 360;
if (d < -180) d += 360;
accumAngle += d;
lastAngle = a;
moveFingerLight(e.clientX, e.clientY);
rotateDisk(d);
while (accumAngle >= DEG_PER_ITEM)  { moveRow(1);  accumAngle -= DEG_PER_ITEM; tickFeedback(); }
while (accumAngle <= -DEG_PER_ITEM) { moveRow(-1); accumAngle += DEG_PER_ITEM; tickFeedback(); }
});
function endDrag() {
if (!dragging) return;
dragging = false;
wheel.classList.remove(‘dragging’);
accumAngle = 0;
}
wheel.addEventListener(‘pointerup’, endDrag);
wheel.addEventListener(‘pointercancel’, endDrag);
wheel.addEventListener(‘wheel’, (e) => {
e.preventDefault();
ensureAudio();
moveRow(e.deltaY > 0 ? 1 : -1);
tickFeedback();
}, { passive: false });

// ====== 버튼 ======
function handleCenter() {
ensureAudio();
if (state.view === ‘tabs’)       goSheet(state.rowCursor);
else if (state.view === ‘sheet’) goEditor();
// editor에선 SAVE/CANCEL 버튼이 따로 있어서 무반응
}
function handleMenu() {
if (document.getElementById(‘dlModal’).classList.contains(‘show’)) return closeDownload();
if (state.view === ‘editor’)     editorCancel();
else if (state.view === ‘sheet’) goTabs();
else if (state.view === ‘tabs’)  showStart();
}

document.getElementById(‘btnMenu’).addEventListener(‘click’, handleMenu);
document.getElementById(‘centerBtn’).addEventListener(‘click’, handleCenter);
document.getElementById(‘btnPlay’).addEventListener(‘click’, handleCenter);
document.getElementById(‘btnPrev’).addEventListener(‘click’, () => {
if (state.view === ‘sheet’) { moveCol(-1); tickFeedback(); }
else                        { moveRow(-1); tickFeedback(); }
});
document.getElementById(‘btnNext’).addEventListener(‘click’, () => {
if (state.view === ‘sheet’) { moveCol(1);  tickFeedback(); }
else                        { moveRow(1);  tickFeedback(); }
});
document.getElementById(‘btnSave’).addEventListener(‘click’, () => {
if (!workbook) return;
saveLocal();
dirty = false;
updateDirty();
toast(‘저장됨’);
});
document.getElementById(‘btnExport’).addEventListener(‘click’, buildAndExport);

document.addEventListener(‘change’, (e) => {
if (e.target?.id === ‘openFile’) onFileOpen(e);
});
document.addEventListener(‘keydown’, (e) => {
// 편집 화면에서 텍스트 입력 중이면 단축키 건너뛰기
const isTyping = e.target.tagName === ‘TEXTAREA’ || e.target.tagName === ‘INPUT’;
if (isTyping) return;

if (e.key === ‘ArrowDown’)       { moveRow(1);  tickFeedback(); }
else if (e.key === ‘ArrowUp’)    { moveRow(-1); tickFeedback(); }
else if (e.key === ‘ArrowLeft’)  { moveCol(-1); tickFeedback(); }
else if (e.key === ‘ArrowRight’) { moveCol(1);  tickFeedback(); }
else if (e.key === ‘Enter’)      handleCenter();
else if (e.key === ‘Escape’ || e.key === ‘Backspace’) handleMenu();
else if ((e.ctrlKey || e.metaKey) && e.key === ‘s’) { e.preventDefault(); document.getElementById(‘btnSave’).click(); }
else if ((e.ctrlKey || e.metaKey) && e.key === ‘e’) { e.preventDefault(); buildAndExport(); }
});

window.addEventListener(‘beforeunload’, (e) => { if (dirty) { e.preventDefault(); e.returnValue = ‘’; } });

start();
</script>

</body>
</html>
