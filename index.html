<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>pindrop</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#2e55a8"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="pindrop"/>

<style>
:root{
  --bg:#d9d5cc;
  --body-edge:#c9c4b8;
  --screen:#cfd7c7;
  --screen-2:#b9c3ac;
  --wheel-edge:#b9b4a8;
  --bar-color:#2e55a8;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:radial-gradient(1000px 700px at 50% 20%,#e7e3d8,transparent 60%),var(--bg);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

.ipod{width:100%;height:100%;display:flex;flex-direction:column;padding:12px 10px 10px;gap:8px}
.ipod-body{
  flex:1;
  background:linear-gradient(180deg,#fbf9f4,#eae6dc);
  border-radius:28px;
  padding:14px 14px 10px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -2px 0 rgba(0,0,0,.06),0 12px 30px rgba(30,30,30,.2),0 0 0 1px var(--body-edge);
  display:flex;flex-direction:column;min-height:0;
}
.screen{
  flex:1;min-height:0;
  border-radius:6px;
  background:linear-gradient(180deg,var(--screen),var(--screen-2));
  box-shadow:inset 0 2px 6px rgba(0,0,0,.25),0 0 0 4px #1a1a1a;
  overflow:hidden;position:relative;
}
.titlebar{
  height:28px;
  background:linear-gradient(180deg,#4a77c9,var(--bar-color));
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.view-stack{position:absolute;top:28px;bottom:0;left:0;right:0;overflow:hidden}
.view{
  position:absolute;inset:0;
  background:linear-gradient(180deg,var(--screen),var(--screen-2));
  overflow:hidden;
  transition:transform 280ms cubic-bezier(.22,.8,.25,1);
}
.view.show{transform:translateX(0)}
.view.slide-in-right{transform:translateX(100%)}
.view.slide-in-left{transform:translateX(-100%)}
.view.slide-out-left{transform:translateX(-100%)}
.view.slide-out-right{transform:translateX(100%)}

/* 첫 화면 */
.welcome{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;text-align:center;gap:12px;
}
.welcome .pin-icon{
  font-size:48px;margin-bottom:8px;
}
.welcome h1{
  font-size:22px;font-weight:700;margin:0;
}
.welcome p{
  font-size:13px;color:#445;margin:0;line-height:1.5;
}
.welcome .btn{
  display:inline-block;
  background:var(--bar-color);color:#fff;border:none;
  padding:10px 18px;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;
  margin-top:8px;
}
.welcome .btn.ghost{
  background:transparent;color:var(--bar-color);
  border:1px solid var(--bar-color);
}
.welcome .small{
  font-size:11px;color:#888;margin-top:16px;
}

/* 컨트롤 */
.controls-wrap{
  display:flex;flex-direction:column;align-items:center;
  padding-top:12px;flex-shrink:0;gap:8px;
}
.top-btns{
  display:flex;justify-content:space-between;
  width:min(72%,300px);gap:12px;
}
.top-btn{
  flex:1;padding:7px 10px;border:none;
  background:linear-gradient(180deg,#f0eee8,#dbd7ce);
  border-radius:8px;
  font-size:11px;font-weight:700;letter-spacing:.1em;
  color:#3a3a3a;cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 1px 3px rgba(0,0,0,.12),0 0 0 1px var(--wheel-edge);
}
.top-btn:active{transform:translateY(1px)}
.top-btn.edit{
  background:linear-gradient(180deg,#6a97e9,#3e65b8);
  color:#fff;
}

.wheel{
  width:min(58%,240px);aspect-ratio:1/1;border-radius:50%;
  position:relative;
  background:radial-gradient(circle at 50% 40%,#f4f1ea,#dcd8ce 70%,#c9c4b8);
  box-shadow:inset 0 2px 4px rgba(255,255,255,.8),inset 0 -6px 14px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.15),0 0 0 1px var(--wheel-edge);
  cursor:grab;touch-action:none;overflow:hidden;
}
.wheel::before{
  content:"";position:absolute;inset:6%;border-radius:50%;
  background:repeating-conic-gradient(from 0deg,rgba(0,0,0,0) 0deg 3deg,rgba(0,0,0,.04) 3deg 3.5deg);
  transform:rotate(var(--rot,0deg));
  transition:transform .08s linear;
  pointer-events:none;
}
.wheel.dragging{cursor:grabbing}
.arrow{
  position:absolute;color:#4a4a4a;cursor:pointer;z-index:2;
  font-size:16px;padding:8px;
}
.arrow.up{top:3%;left:50%;transform:translateX(-50%)}
.arrow.down{bottom:3%;left:50%;transform:translateX(-50%)}
.arrow.left{top:50%;left:3%;transform:translateY(-50%)}
.arrow.right{top:50%;right:3%;transform:translateY(-50%)}
.arrow:active{color:var(--bar-color)}

.center-btn{
  position:absolute;top:50%;left:50%;
  width:38%;height:38%;
  transform:translate(-50%,-50%);
  border:none;border-radius:50%;
  background:radial-gradient(circle at 50% 35%,#fff,#e8e4da 75%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -4px 10px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.15),0 0 0 1px var(--wheel-edge);
  cursor:pointer;z-index:3;
}

.btn-panel{
  display:flex;gap:10px;
  padding:12px 14px 14px;
  background:linear-gradient(180deg,#eae6dc,#ddd9d0);
  border-radius:18px;
  box-shadow:0 10px 24px rgba(30,30,30,.18),0 0 0 1px var(--body-edge);
  flex-shrink:0;
}
.btn-panel button{
  flex:1;padding:12px 0;border:none;border-radius:12px;
  font-size:13px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 2px 4px rgba(0,0,0,.15);
}
.btn-sync{background:linear-gradient(180deg,#f0eee8,#dbd7ce);color:#3a3a3a}
.btn-add{background:linear-gradient(180deg,#4a77c9,var(--bar-color));color:#fff}

.toast{
  position:fixed;left:50%;bottom:80px;transform:translateX(-50%);
  background:rgba(0,0,0,.8);color:#fff;font-size:13px;
  padding:8px 14px;border-radius:16px;opacity:0;transition:opacity .2s;
  pointer-events:none;z-index:200;max-width:80%;text-align:center;
}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="ipod">
  <div class="ipod-body">
    <div class="screen">
      <div class="titlebar"><span id="screenTitle">pindrop</span></div>
      <div class="view-stack" id="viewStack">
        <!-- 초기 화면: HTML에 직접 박아둠 (JS 없어도 보임) -->
        <div class="view show" id="welcomeView">
          <div class="welcome">
            <div class="pin-icon">📍</div>
            <h1>pindrop</h1>
            <p>장소별 정보를<br/>iPod처럼 기록하기</p>
            <button class="btn" onclick="openSetup()">시작하기</button>
            <div class="small" id="appStatus">Google 시트 연결이 필요해요</div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls-wrap">
      <div class="top-btns">
        <button class="top-btn" id="btnMenu">MENU</button>
        <button class="top-btn edit" id="btnEdit">EDIT</button>
      </div>
      <div class="wheel" id="wheel">
        <span class="arrow up" id="btnUp">▲</span>
        <span class="arrow down" id="btnDown">▼</span>
        <span class="arrow left" id="btnLeft">◀</span>
        <span class="arrow right" id="btnRight">▶</span>
        <button class="center-btn" id="centerBtn" aria-label="View"></button>
      </div>
    </div>
  </div>

  <div class="btn-panel">
    <button class="btn-sync" id="btnSync">SYNC</button>
    <button class="btn-add" id="btnAdd">＋</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ────────────────────────────────────────
// 전역 상태
// ────────────────────────────────────────
const LS_URL = 'pindrop:scriptUrl';
let scriptUrl = localStorage.getItem(LS_URL) || '';

const state = {
  view: 'welcome', // welcome | setup | list | detail | editor
};

// ────────────────────────────────────────
// 유틸
// ────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
  '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
}[c]));

let toastTimer;
function toast(msg){
  const el = $('toast');
  if (!el) { console.log('[toast]', msg); return; }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function setTitle(t){ $('screenTitle').textContent = t; }

// ────────────────────────────────────────
// 뷰 전환
// ────────────────────────────────────────
const viewStack = $('viewStack');
let currentView = $('welcomeView');
let animating = false;
const ANIM = 280;

function createView(html){
  const v = document.createElement('div');
  v.className = 'view';
  v.innerHTML = html;
  return v;
}

function transitionTo(newView, dir){
  dir = dir || 'forward';
  if (animating && currentView) {
    // 애니메이션 중이면 즉시 정리
  }
  animating = true;
  const old = currentView;
  currentView = newView;

  newView.classList.add(dir === 'forward' ? 'slide-in-right' : 'slide-in-left');
  viewStack.appendChild(newView);
  void newView.offsetWidth; // reflow
  newView.classList.remove('slide-in-right', 'slide-in-left');
  newView.classList.add('show');

  if (old) {
    old.classList.remove('show');
    old.classList.add(dir === 'forward' ? 'slide-out-left' : 'slide-out-right');
  }

  setTimeout(() => {
    if (old && old !== currentView) old.remove();
    animating = false;
  }, ANIM);
}

// ────────────────────────────────────────
// 화면들
// ────────────────────────────────────────
function openSetup(){
  state.view = 'setup';
  setTitle('설정');

  let html = '<div class="welcome">';
  html += '<div class="pin-icon">⚙️</div>';
  html += '<h1>Google 시트 연결</h1>';
  html += '<p style="font-size:12px;">Apps Script 웹앱 URL을<br/>붙여넣어 주세요</p>';
  html += '<input type="text" id="urlInput" ';
  html += 'placeholder="https://script.google.com/..." ';
  html += 'style="width:90%;max-width:340px;padding:8px 10px;border:1px solid #c9c4b8;border-radius:6px;font-size:13px;margin:8px 0;" ';
  html += 'value="' + esc(scriptUrl) + '"/>';
  html += '<button class="btn" onclick="saveScriptUrl()">저장</button>';
  html += '<button class="btn ghost" onclick="pasteFromClipboard()">📋 클립보드에서 붙여넣기</button>';
  html += '<div class="small">아직 준비 안 되셨다면<br/>다음 단계에서 안내해드려요</div>';
  html += '</div>';

  const v = createView(html);
  transitionTo(v, 'forward');
}

async function pasteFromClipboard(){
  try {
    if (!navigator.clipboard) {
      toast('클립보드 권한 없음');
      return;
    }
    const text = await navigator.clipboard.readText();
    const input = $('urlInput');
    if (input) {
      input.value = text;
      toast('붙여넣음');
    }
  } catch(e) {
    toast('붙여넣기 실패');
  }
}

function saveScriptUrl(){
  const input = $('urlInput');
  if (!input) return;
  const url = input.value.trim();

  if (!url) {
    toast('URL을 입력하세요');
    return;
  }
  if (!/^https:\/\/script\.google\.com\//.test(url)) {
    toast('Apps Script URL 형식이 아니에요');
    return;
  }

  scriptUrl = url;
  localStorage.setItem(LS_URL, url);
  toast('저장됨');
  // 다음 단계: 시트 데이터 로드
  toast('시트 연동은 다음 업데이트에서 추가됩니다');
}

function goBack(){
  if (state.view === 'setup') {
    state.view = 'welcome';
    setTitle('pindrop');
    transitionTo($('welcomeView') || rebuildWelcome(), 'backward');
  }
}

function rebuildWelcome(){
  const v = document.createElement('div');
  v.className = 'view';
  v.id = 'welcomeView';
  v.innerHTML = '<div class="welcome"><div class="pin-icon">📍</div><h1>pindrop</h1><p>장소별 정보를<br/>iPod처럼 기록하기</p><button class="btn" onclick="openSetup()">시작하기</button><div class="small" id="appStatus">' + (scriptUrl ? '✓ 시트 연결됨' : 'Google 시트 연결이 필요해요') + '</div></div>';
  return v;
}

// ────────────────────────────────────────
// 컨트롤 (휠 드래그 + 화살표 + 버튼)
// ────────────────────────────────────────
const wheel = $('wheel');
let diskRot = 0;
function rotateDisk(d){ diskRot += d; wheel.style.setProperty('--rot', diskRot + 'deg'); }

let dragging = false, lastAngle = 0, accum = 0;
const DEG = 22;

function angleFromEvent(e){
  const r = wheel.getBoundingClientRect();
  return Math.atan2(e.clientY - (r.top + r.height/2),
                    e.clientX - (r.left + r.width/2)) * 180 / Math.PI;
}

wheel.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.center-btn') || e.target.closest('.arrow')) return;
  dragging = true;
  wheel.classList.add('dragging');
  wheel.setPointerCapture(e.pointerId);
  lastAngle = angleFromEvent(e);
});
wheel.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const a = angleFromEvent(e);
  let d = a - lastAngle;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  accum += d;
  lastAngle = a;
  rotateDisk(d);
  while (accum >= DEG) { moveCursor(1); accum -= DEG; }
  while (accum <= -DEG) { moveCursor(-1); accum += DEG; }
});
function endDrag(){
  if (!dragging) return;
  dragging = false;
  wheel.classList.remove('dragging');
  accum = 0;
}
wheel.addEventListener('pointerup', endDrag);
wheel.addEventListener('pointercancel', endDrag);

// 휠 마우스 휠 (데스크톱)
wheel.addEventListener('wheel', (e) => {
  e.preventDefault();
  moveCursor(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

function moveCursor(d){
  // 다음 단계에서 리스트/시트별 커서 이동 구현
  // 지금은 placeholder
}

$('btnMenu').addEventListener('click', goBack);
$('btnEdit').addEventListener('click', () => toast('편집은 다음 업데이트에서'));
$('centerBtn').addEventListener('click', () => toast('선택은 다음 업데이트에서'));
$('btnUp').addEventListener('click', () => moveCursor(-1));
$('btnDown').addEventListener('click', () => moveCursor(1));
$('btnLeft').addEventListener('click', () => toast('열 이동'));
$('btnRight').addEventListener('click', () => toast('열 이동'));
$('btnSync').addEventListener('click', () => {
  if (!scriptUrl) {
    toast('먼저 Google 시트를 연결하세요');
    openSetup();
    return;
  }
  toast('시트 연동은 다음 업데이트에서');
});
$('btnAdd').addEventListener('click', () => toast('추가는 다음 업데이트에서'));

// 키보드
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowDown') moveCursor(1);
  else if (e.key === 'ArrowUp') moveCursor(-1);
  else if (e.key === 'Escape' || e.key === 'Backspace') goBack();
});

// 전역 노출 (onclick 속성에서 호출)
window.openSetup = openSetup;
window.saveScriptUrl = saveScriptUrl;
window.pasteFromClipboard = pasteFromClipboard;
window.goBack = goBack;

// ────────────────────────────────────────
// Service Worker 등록
// ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then((reg) => console.log('SW registered', reg.scope))
      .catch((err) => console.warn('SW failed', err));
  });
}

// 시작 시 상태 메시지 업데이트
if (scriptUrl) {
  const s = $('appStatus');
  if (s) s.textContent = '✓ 시트 연결됨';
}
</script>
</body>
</html>
