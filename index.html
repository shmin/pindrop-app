<!doctype html>

<html lang="ko">
<head>
<meta charset="utf-8" />

<title>iPod × Local Excel</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #d9d5cc;
    --body-edge: #c9c4b8;
    --screen: #cfd7c7;
    --screen-2: #b9c3ac;
    --wheel-edge: #b9b4a8;
    --bar: linear-gradient(180deg, #4a77c9, #2e55a8);
    --anim-dur: 280ms;
    --anim-ease: cubic-bezier(.22,.8,.25,1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(1000px 700px at 50% 20%, #e7e3d8 0%, transparent 60%),
      var(--bg);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    /* iOS safe area 대응 */
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

/* ── iPod 전체 레이아웃: 화면 꽉 차게 ── */
.ipod {
width: 100%;
height: 100%;
display: flex; flex-direction: column;
align-items: stretch;
padding: 12px 10px 10px;
gap: 8px;
}

.ipod-body {
flex: 1;
background: linear-gradient(180deg, #fbf9f4 0%, #eae6dc 100%);
border-radius: 28px;
padding: 14px 14px 10px;
box-shadow:
inset 0 1px 0 rgba(255,255,255,.9),
inset 0 -2px 0 rgba(0,0,0,.06),
0 12px 30px rgba(30,30,30,.2),
0 0 0 1px var(–body-edge);
display: flex; flex-direction: column;
min-height: 0;
}

/* ── 스크린: flex 1, 휠은 작게 ── */
.screen {
flex: 1;
min-height: 0;
border-radius: 6px;
background: linear-gradient(180deg, var(–screen) 0%, var(–screen-2) 100%);
box-shadow:
inset 0 2px 6px rgba(0,0,0,.25),
inset 0 -1px 0 rgba(255,255,255,.3),
0 0 0 4px #1a1a1a, 0 0 0 5px #3a3a3a;
overflow: hidden;
position: relative;
}

.titlebar {
height: 26px; background: var(–bar); color: #fff;
display: flex; align-items: center; justify-content: center;
padding: 0 10px; font-size: 13px; font-weight: 700; position: relative;
text-align: center;
}
.titlebar::before {
content: “”; position: absolute; inset: 0 0 auto 0; height: 45%;
background: linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0));
}
.titlebar .t-text { position: relative; z-index: 1; }

/* ── 뷰 스택 (슬라이드 애니메이션) ── */
.view-stack {
position: absolute;
top: 26px; bottom: 0; left: 0; right: 0;
overflow: hidden;
}
.view {
position: absolute; inset: 0;
background: linear-gradient(180deg, var(–screen) 0%, var(–screen-2) 100%);
overflow: hidden;
transition: transform var(–anim-dur) var(–anim-ease);
will-change: transform;
}
.view.slide-in-right  { transform: translateX(100%); }
.view.slide-in-left   { transform: translateX(-100%); }
.view.slide-out-left  { transform: translateX(-100%); }
.view.slide-out-right { transform: translateX(100%); }
.view.show            { transform: translateX(0); }

/* ── 리스트 ── */
.list { position: absolute; inset: 0; overflow: hidden; }
.list ul { list-style: none; margin: 0; padding: 0; transition: transform .18s cubic-bezier(.2,.8,.2,1); }
.list li {
padding: 6px 12px;
font-size: 15px; line-height: 1.2;
border-bottom: 1px solid rgba(0,0,0,.06);
display: flex; align-items: center; gap: 10px;
min-height: 44px;
}
.list li .thumb {
width: 32px; height: 32px; border-radius: 5px;
background: rgba(0,0,0,.08) center/cover no-repeat;
flex-shrink: 0; border: 1px solid rgba(0,0,0,.12);
}
.list li .label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list li .meta {
color: #555; font-size: 12px; flex-shrink: 0;
max-width: 120px; text-align: right;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.list li .chev { color: #555; font-size: 14px; flex-shrink: 0; }
.list li.active { background: var(–bar); color: #fff; }
.list li.active .meta, .list li.active .chev { color: rgba(255,255,255,.9); }
.list li.active .thumb { border-color: rgba(255,255,255,.4); }

/* ── 옵션 화면 (view 안에 들어가는 컨텐츠) ── */
.options-body { position: absolute; inset: 0; overflow: hidden; }
.options-body ul { list-style: none; margin: 0; padding: 0; transition: transform .18s cubic-bezier(.2,.8,.2,1); }
.options-body li {
padding: 0 14px;
font-size: 16px; line-height: 1.2;
border-bottom: 1px solid rgba(0,0,0,.06);
display: flex; align-items: center; justify-content: space-between;
min-height: 44px;
}
.options-body li .check { font-size: 16px; color: #2e55a8; width: 22px; flex-shrink: 0; text-align: right; }
.options-body li.active { background: var(–bar); color: #fff; }
.options-body li.active .check { color: #fff; }

/* ── 초기 화면 ── */
.empty { padding: 24px 18px; font-size: 14px; color: #333; text-align: center; line-height: 1.6; }
.empty .big { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
.empty button, .empty label.btn {
display: inline-block; margin: 8px 4px 0;
background: #2e55a8; color: #fff; border: none;
padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
}
.empty label.btn.ghost { background: transparent; color: #2e55a8; border: 1px solid #2e55a8; }
.empty label.btn.danger { background: transparent; color: #c44; border: 1px solid #c44; font-size: 12px; }
.empty input[type=file] { display: none; }

/* ── 다운로드 모달 ── */
.dlmodal {
position: absolute; inset: 26px 0 0 0;
background: rgba(0,0,0,.9);
display: none; align-items: center; justify-content: center;
flex-direction: column; gap: 12px; padding: 20px; z-index: 100;
}
.dlmodal.show { display: flex; }
.dlmodal p { color: #fff; font-size: 13px; text-align: center; margin: 0; line-height: 1.5; }
.dlmodal a.dlbtn {
background: #2e55a8; color: #fff; padding: 10px 20px; border-radius: 8px;
text-decoration: none; font-size: 14px; font-weight: 600;
}
.dlmodal button {
background: transparent; color: #ccc; border: 1px solid #555;
padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
}

.toast {
position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
background: rgba(0,0,0,.8); color: #fff; font-size: 13px;
padding: 8px 14px; border-radius: 16px; opacity: 0; transition: opacity .2s;
pointer-events: none; white-space: nowrap; z-index: 200;
max-width: 80%; text-align: center;
}
.toast.show { opacity: 1; }

/* ── 휠: 작게 ── */
.wheel-wrap {
display: flex; align-items: center; justify-content: center;
padding-top: 12px;
flex-shrink: 0;
}
.wheel {
width: min(58%, 240px);
aspect-ratio: 1/1; border-radius: 50%;
position: relative;
background: radial-gradient(circle at 50% 40%, #f4f1ea 0%, #dcd8ce 70%, #c9c4b8 100%);
box-shadow:
inset 0 2px 4px rgba(255,255,255,.8),
inset 0 -6px 14px rgba(0,0,0,.12),
0 2px 6px rgba(0,0,0,.15),
0 0 0 1px var(–wheel-edge);
cursor: grab; touch-action: none; overflow: hidden;
}
.wheel::before {
content: “”;
position: absolute; inset: 6%; border-radius: 50%;
background: repeating-conic-gradient(
from 0deg,
rgba(0,0,0,0) 0deg, rgba(0,0,0,0) 3deg,
rgba(0,0,0,.04) 3deg, rgba(0,0,0,.04) 3.5deg
);
transform: rotate(var(–rot, 0deg));
transition: transform .08s linear;
pointer-events: none;
}
.wheel.dragging { cursor: grabbing; }
.wheel .tickmark {
position: absolute; top: 3%; left: 50%;
width: 3px; height: 7px; background: #4a77c9;
border-radius: 2px; transform: translateX(-50%);
opacity: 0; pointer-events: none;
}
.wheel .tickmark.flash { opacity: 1; box-shadow: 0 0 8px #4a77c9; transition: opacity .05s ease-out; }
.wheel .tickmark.fade  { opacity: 0; transition: opacity .3s ease; }
.wheel .fingerLight {
position: absolute;
width: 42px; height: 42px; border-radius: 50%;
background: radial-gradient(circle,
rgba(74,119,201,.4) 0%, rgba(74,119,201,.15) 40%, transparent 70%);
transform: translate(-50%, -50%) scale(0);
transition: transform .2s ease, opacity .2s ease;
opacity: 0; pointer-events: none; mix-blend-mode: multiply;
}
.wheel.dragging .fingerLight { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.tag {
position: absolute; font-weight: 700; color: #4a4a4a;
letter-spacing: .06em; cursor: pointer; font-size: 11px; z-index: 2;
}
.tag.menu { top: 8%; left: 50%; transform: translateX(-50%); }
.tag.prev { top: 50%; left: 8%;  transform: translateY(-50%); font-size: 14px; }
.tag.next { top: 50%; right: 8%; transform: translateY(-50%); font-size: 14px; }
.tag.play { bottom: 8%; left: 50%; transform: translateX(-50%); }
.center-btn {
position: absolute; top: 50%; left: 50%;
width: 38%; height: 38%;
transform: translate(-50%, -50%);
border: none; border-radius: 50%;
background: radial-gradient(circle at 50% 35%, #ffffff 0%, #e8e4da 75%);
box-shadow:
inset 0 1px 0 rgba(255,255,255,.9),
inset 0 -4px 10px rgba(0,0,0,.08),
0 1px 3px rgba(0,0,0,.15),
0 0 0 1px var(–wheel-edge);
cursor: pointer; z-index: 3;
}
.center-btn:active { box-shadow: inset 0 2px 4px rgba(0,0,0,.12), 0 0 0 1px var(–wheel-edge); }

/* ── 하단 버튼 패널 ── */
.btn-panel {
display: flex; gap: 10px;
padding: 12px 14px 14px;
background: linear-gradient(180deg, #eae6dc 0%, #ddd9d0 100%);
border-radius: 18px;
box-shadow:
0 10px 24px rgba(30,30,30,.18),
0 0 0 1px var(–body-edge);
flex-shrink: 0;
}
.btn-panel button {
flex: 1;
padding: 12px 0;
border: none;
border-radius: 12px;
font-size: 13px;
font-weight: 700;
letter-spacing: .08em;
cursor: pointer;
position: relative;
box-shadow:
inset 0 1px 0 rgba(255,255,255,.7),
0 2px 4px rgba(0,0,0,.15);
transition: transform .08s, box-shadow .08s;
}
.btn-panel button:active {
transform: translateY(1px);
box-shadow: inset 0 2px 3px rgba(0,0,0,.15);
}
.btn-save {
background: linear-gradient(180deg, #f0eee8 0%, #dbd7ce 100%);
color: #3a3a3a;
}
.btn-export {
background: linear-gradient(180deg, #4a77c9 0%, #2e55a8 100%);
color: #fff;
box-shadow:
inset 0 1px 0 rgba(255,255,255,.3),
0 2px 4px rgba(46,85,168,.4) !important;
}
.btn-panel .dot {
position: absolute; top: 7px; right: 8px;
width: 7px; height: 7px; border-radius: 50%;
background: #ff9d5a; box-shadow: 0 0 4px rgba(255,180,80,.8);
}
.btn-panel .dot.clean { background: #a0e878; box-shadow: 0 0 4px rgba(160,230,120,.8); }

/* 가로 모드 대응 */
@media (orientation: landscape) and (max-height: 500px) {
.ipod { flex-direction: row; padding: 8px; }
.ipod-body { flex: 1.5; }
.btn-panel {
flex-direction: column; border-radius: 18px;
min-width: 100px;
}
}
</style>

<script>
window.addEventListener('error', (e) => {
  toast('에러: ' + (e.message || '').slice(0, 60));
});
window.addEventListener('unhandledrejection', (e) => {
  toast('에러: ' + String(e.reason).slice(0, 60));
});

const MAX_CELL_CHARS = 32000;
const LS_KEY = 'ipod-wb-v2';
const LS_FILENAME = 'ipod-filename-v2';
let workbook = null;
let fileName = localStorage.getItem(LS_FILENAME) || 'ipod-data.xlsx';
let dirty = false;

// view: 'init' | 'tabs' | 'rows' | 'options'
const state = {
  view: 'init',
  currentTabIdx: -1,
  rowCursor: 0,
  optionCursor: 0,
};

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// ====== 오디오 / 피드백 ======
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx?.state === 'suspended') audioCtx.resume();
}
function playTick() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(2200, now);
  osc.frequency.exponentialRampToValueAtTime(800, now + 0.02);
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.04);
}

const tickEl = document.getElementById('tickmark');
let tickTimer;
function flashTick() {
  tickEl.classList.remove('fade');
  tickEl.classList.add('flash');
  clearTimeout(tickTimer);
  tickTimer = setTimeout(() => {
    tickEl.classList.remove('flash');
    tickEl.classList.add('fade');
  }, 60);
}
function tickFeedback() {
  playTick(); flashTick();
  try { navigator.vibrate && navigator.vibrate(4); } catch(e) {}
}

const wheel = document.getElementById('wheel');
const fingerLight = document.getElementById('fingerLight');
let diskRot = 0;
function moveFingerLight(cx, cy) {
  const r = wheel.getBoundingClientRect();
  fingerLight.style.left = (cx - r.left) + 'px';
  fingerLight.style.top  = (cy - r.top)  + 'px';
}
function rotateDisk(deg) {
  diskRot += deg;
  wheel.style.setProperty('--rot', diskRot + 'deg');
}

// ====== 뷰 스택 (슬라이드 전환) ======
const viewStack = document.getElementById('viewStack');
let currentView = null;      // DOM element
let animating = false;
const ANIM_DUR = 280;

function createView(htmlContent) {
  const v = document.createElement('div');
  v.className = 'view';
  v.innerHTML = htmlContent;
  return v;
}

// direction: 'forward' (새 뷰가 오른쪽에서 들어옴), 'backward' (왼쪽에서)
function transitionTo(newView, direction = 'forward') {
  if (animating) {
    // 빠르게 연타하면 진행중인 애니 취소하고 강제 세팅
    if (currentView) currentView.remove();
  }
  animating = true;
  const old = currentView;
  currentView = newView;

  // 새 뷰를 스택에 붙이고 초기 위치 설정
  if (direction === 'forward') {
    newView.classList.add('slide-in-right');
  } else {
    newView.classList.add('slide-in-left');
  }
  viewStack.appendChild(newView);

  // 강제 reflow 한 뒤에 클래스 변경해야 transition이 발동됨
  void newView.offsetWidth;

  // 새 뷰를 show, 기존 뷰를 반대 방향으로 밀어냄
  newView.classList.remove('slide-in-right', 'slide-in-left');
  newView.classList.add('show');

  if (old) {
    old.classList.remove('show');
    if (direction === 'forward') old.classList.add('slide-out-left');
    else old.classList.add('slide-out-right');
  }

  setTimeout(() => {
    if (old) old.remove();
    animating = false;
  }, ANIM_DUR);
}

function setFirstView(newView) {
  if (currentView) currentView.remove();
  currentView = newView;
  newView.classList.add('show');
  viewStack.appendChild(newView);
}

// ====== 시작 ======
function start() {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) {
    try {
      workbook = JSON.parse(saved);
      dirty = false;
      updateDirty();
      goTabs(true);
      return;
    } catch(e) {}
  }
  showStart();
}

function showStart() {
  state.view = 'init';
  setTitle('iPod');
  const hasBackup = !!localStorage.getItem(LS_KEY);
  const html = `
    <div class="empty">
      <div class="big">엑셀 파일로 시작</div>
      <div>기존 파일을 열거나 새 파일을 만들어요.</div>
      <label class="btn">파일 열기<input type="file" id="openFile" accept=".xlsx,.xls"/></label>
      <button class="btn ghost" onclick="createNew()">새로 만들기</button>
      ${hasBackup ? '<br><button class="btn danger" onclick="resetAll()">저장 데이터 삭제</button>' : ''}
    </div>`;
  const v = createView(html);
  if (currentView) transitionTo(v, 'backward');
  else setFirstView(v);

  setTimeout(() => {
    const inp = v.querySelector('#openFile');
    if (inp) inp.addEventListener('change', onFileOpen);
  }, 50);
}

async function onFileOpen(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  fileName = file.name;
  localStorage.setItem(LS_FILENAME, fileName);
  try {
    const ab = await file.arrayBuffer();
    workbook = parseWorkbook(ab);
    dirty = false;
    saveLocal();
    updateDirty();
    goTabs();
  } catch(err) { toast('파일 읽기 실패: ' + err.message); }
}

function createNew() {
  workbook = { tabs: [{
    title: 'Sheet1',
    rows: [
      { label: '201호', value: '', options: ['청소완료','점검필요','공실'], image: '' },
      { label: '202호', value: '', options: ['청소완료','점검필요','공실'], image: '' },
    ]
  }]};
  fileName = 'ipod-data.xlsx';
  localStorage.setItem(LS_FILENAME, fileName);
  dirty = true;
  saveLocal();
  updateDirty();
  goTabs();
}

function resetAll() {
  if (!confirm('저장된 데이터를 모두 삭제할까요?')) return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_FILENAME);
  workbook = null;
  fileName = 'ipod-data.xlsx';
  dirty = false;
  updateDirty();
  showStart();
}

// ====== 파싱 ======
function parseWorkbook(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array' });
  const imageChunks = {};

  if (wb.SheetNames.includes('_images')) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets['_images'], { header: 1 });
    for (let i = 1; i < rows.length; i++) {
      const [t, l, p, d] = rows[i] || [];
      if (t == null || l == null || d == null) continue;
      const key = `${t}::${l}`;
      if (!imageChunks[key]) imageChunks[key] = {};
      imageChunks[key][Number(p) || 0] = String(d);
    }
  }
  const imageMap = {};
  Object.keys(imageChunks).forEach(key => {
    const parts = imageChunks[key];
    imageMap[key] = Object.keys(parts).map(Number).sort((a,b)=>a-b).map(i=>parts[i]).join('');
  });

  const tabs = [];
  wb.SheetNames.forEach(name => {
    if (name === '_images') return;
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1 });
    const data = rows.slice(1).map(r => {
      const label = String(r?.[0] ?? '').trim();
      const value = String(r?.[1] ?? '').trim();
      const options = r.slice(2).map(v => String(v ?? '').trim()).filter(v => v !== '');
      return { label, value, options, image: imageMap[`${name}::${label}`] || '' };
    }).filter(r => r.label !== '');
    tabs.push({ title: name, rows: data });
  });

  if (!tabs.length) tabs.push({ title: 'Sheet1', rows: [] });
  return { tabs };
}

// ====== Export ======
function buildAndExport() {
  if (!workbook) return;
  try {
    toast('Export 중...');
    const wb = XLSX.utils.book_new();

    workbook.tabs.forEach(tab => {
      const maxOpts = Math.max(0, ...tab.rows.map(r => r.options.length));
      const header = ['label', 'value', ...Array.from({length: maxOpts}, (_,i) => `option${i+1}`)];
      const aoa = [header, ...tab.rows.map(r => [r.label, r.value, ...r.options])];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), tab.title);
    });

    const imgAoa = [['tab','label','part','dataChunk']];
    workbook.tabs.forEach(tab => {
      tab.rows.forEach(r => {
        if (!r.image) return;
        const chunks = Math.ceil(r.image.length / MAX_CELL_CHARS);
        for (let i = 0; i < chunks; i++) {
          imgAoa.push([tab.title, r.label, i, r.image.slice(i*MAX_CELL_CHARS,(i+1)*MAX_CELL_CHARS)]);
        }
      });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(imgAoa), '_images');
    if (!wb.Workbook) wb.Workbook = { Sheets: [] };
    wb.Workbook.Sheets = wb.SheetNames.map(n => ({ name: n, Hidden: n === '_images' ? 1 : 0 }));

    const ab = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([ab], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    });
    const fname = fileName || 'ipod-data.xlsx';

    if (navigator.share && navigator.canShare) {
      const sf = new File([blob], fname, { type: blob.type });
      if (navigator.canShare({ files: [sf] })) {
        navigator.share({ files: [sf], title: fname })
          .then(() => toast('공유됨'))
          .catch(err => { if (err.name !== 'AbortError') fallbackDownload(blob, fname); });
        return;
      }
    }
    fallbackDownload(blob, fname);
  } catch(err) {
    toast('Export 실패: ' + String(err.message).slice(0, 50));
  }
}

function fallbackDownload(blob, fname) {
  const url = URL.createObjectURL(blob);
  if (isIOS) {
    const link = document.getElementById('dlLink');
    link.href = url; link.download = fname;
    document.getElementById('dlMsg').innerHTML =
      `<b>${esc(fname)}</b><br>버튼을 <b>길게 눌러</b> 다운로드<br>또는 탭 후 공유 → 파일에 저장`;
    document.getElementById('dlModal').classList.add('show');
  } else {
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    toast('Export 완료');
  }
}
function closeDownload() { document.getElementById('dlModal').classList.remove('show'); }

// ====== 로컬 저장 ======
function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(workbook)); }
  catch(e) { toast('저장 용량 초과'); }
}
function markDirty() { dirty = true; updateDirty(); }
function updateDirty() {
  const dot = document.getElementById('dirtyDot');
  dot.classList.toggle('clean', !dirty);
}

// ====== 뷰 전환 (애니메이션 포함) ======
function goTabs(initial) {
  const wasDeeper = (state.view === 'rows' || state.view === 'options');
  state.view = 'tabs';
  state.rowCursor = 0;
  setTitle(fileName.replace(/\.xlsx?$/,'').slice(0,24) || 'iPod');

  if (!workbook?.tabs.length) {
    showEmptyView('탭이 없어요.', wasDeeper ? 'backward' : 'forward');
    return;
  }
  const html = `<div class="list"><ul>${
    workbook.tabs.map((t,i) => `
      <li data-idx="${i}" class="${i === state.rowCursor ? 'active' : ''}">
        <span class="label">${esc(t.title)}</span>
        <span class="meta">${t.rows.length}행</span>
        <span class="chev">›</span>
      </li>`).join('')
  }</ul></div>`;

  const v = createView(html);
  const dir = wasDeeper ? 'backward' : 'forward';
  if (initial) setFirstView(v);
  else transitionTo(v, dir);

  // cursor 포지션 동기화용 리스트 ref
  setTimeout(() => applyListCursor(), ANIM_DUR + 20);
}

function goRows(idx, direction = 'forward') {
  state.view = 'rows';
  state.currentTabIdx = idx;
  state.rowCursor = 0;
  const tab = workbook.tabs[idx];
  setTitle(tab.title.slice(0, 24));

  if (!tab.rows.length) {
    showEmptyView('행이 없어요.<br>A: 이름  B: 현재값  C~: 옵션들', direction);
    return;
  }

  const html = `<div class="list"><ul>${
    tab.rows.map((r,i) => {
      const thumb = r.image
        ? `<span class="thumb" style="background-image:url('${r.image.replace(/'/g,"\\'")}')"></span>`
        : '';
      return `
        <li data-idx="${i}" class="${i === state.rowCursor ? 'active' : ''}">
          ${thumb}
          <span class="label">${esc(r.label)}</span>
          <span class="meta">${esc(r.value || '—')}</span>
          <span class="chev">›</span>
        </li>`;
    }).join('')
  }</ul></div>`;

  const v = createView(html);
  transitionTo(v, direction);
  setTimeout(() => applyListCursor(), ANIM_DUR + 20);
}

function goOptions(rowIdx) {
  const row = currentTab().rows[rowIdx];
  if (!row.options.length) { toast('옵션이 없어요 (C열~에 추가)'); return; }
  state.view = 'options';

  const cur = row.options.indexOf(row.value);
  state.optionCursor = cur >= 0 ? cur : 0;
  setTitle(row.label);

  const html = `<div class="options-body"><ul>${
    row.options.map((opt, i) => `
      <li data-idx="${i}" class="${i === state.optionCursor ? 'active' : ''}">
        <span>${esc(opt)}</span>
        <span class="check">${opt === row.value ? '✓' : ''}</span>
      </li>`).join('')
  }</ul></div>`;

  const v = createView(html);
  transitionTo(v, 'forward');
  setTimeout(() => applyOptionCursor(), ANIM_DUR + 20);
}

function selectOption() {
  const row = currentTab().rows[state.rowCursor];
  const chosen = row.options[state.optionCursor];
  if (chosen == null) return;
  row.value = chosen;
  markDirty();
  toast('✓ ' + chosen);
  // 이전 화면(rows)으로 애니메이션하며 돌아감
  goRows(state.currentTabIdx, 'backward');
}

function showEmptyView(msg, direction) {
  const html = `<div class="empty">${msg}</div>`;
  const v = createView(html);
  transitionTo(v, direction);
}

function currentTab() { return workbook?.tabs[state.currentTabIdx]; }
function currentRow() { return currentTab()?.rows[state.rowCursor]; }

// ====== 렌더 / 커서 ======
const screenTitle = document.getElementById('screenTitle');
const toastEl     = document.getElementById('toast');
function setTitle(t) { screenTitle.textContent = t; }

function applyListCursor() {
  if (!currentView) return;
  const ul = currentView.querySelector('.list ul');
  if (!ul) return;
  const lis = [...ul.querySelectorAll('li')];
  const cur = state.rowCursor;
  lis.forEach((li, i) => li.classList.toggle('active', i === cur));
  if (!lis.length) return;
  const liH = lis[0].getBoundingClientRect().height || 44;
  const listH = currentView.querySelector('.list').getBoundingClientRect().height;
  const visible = Math.max(1, Math.floor(listH / liH));
  const anchor = Math.min(cur, Math.max(0, lis.length - visible));
  ul.style.transform = `translateY(${-anchor * liH}px)`;
}

function applyOptionCursor() {
  if (!currentView) return;
  const ul = currentView.querySelector('.options-body ul');
  if (!ul) return;
  const lis = [...ul.querySelectorAll('li')];
  lis.forEach((li, i) => li.classList.toggle('active', i === state.optionCursor));
  if (!lis.length) return;
  const liH = lis[0].getBoundingClientRect().height || 44;
  const bodyH = currentView.querySelector('.options-body').getBoundingClientRect().height;
  const visible = Math.max(1, Math.floor(bodyH / liH));
  const anchor = Math.min(state.optionCursor, Math.max(0, lis.length - visible));
  ul.style.transform = `translateY(${-anchor * liH}px)`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ====== 커서 이동 ======
function moveCursor(delta) {
  if (state.view === 'options') {
    const row = currentRow();
    if (!row) return;
    const max = row.options.length - 1;
    state.optionCursor = Math.max(0, Math.min(max, state.optionCursor + delta));
    applyOptionCursor();
  } else if (state.view === 'rows') {
    const max = (currentTab()?.rows.length || 0) - 1;
    state.rowCursor = Math.max(0, Math.min(max, state.rowCursor + delta));
    applyListCursor();
  } else if (state.view === 'tabs') {
    const max = (workbook?.tabs.length || 0) - 1;
    state.rowCursor = Math.max(0, Math.min(max, state.rowCursor + delta));
    applyListCursor();
  }
}

// ====== 휠 이벤트 ======
let dragging = false, lastAngle = 0, accumAngle = 0;
const DEG_PER_ITEM = 22;

function angleFromEvent(e) {
  const r = wheel.getBoundingClientRect();
  return Math.atan2(e.clientY - (r.top + r.height/2),
                    e.clientX - (r.left + r.width/2)) * 180 / Math.PI;
}

wheel.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.center-btn') || e.target.closest('.tag')) return;
  dragging = true;
  wheel.classList.add('dragging');
  wheel.setPointerCapture(e.pointerId);
  lastAngle = angleFromEvent(e);
  moveFingerLight(e.clientX, e.clientY);
  ensureAudio();
});
wheel.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const a = angleFromEvent(e);
  let d = a - lastAngle;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  accumAngle += d;
  lastAngle = a;
  moveFingerLight(e.clientX, e.clientY);
  rotateDisk(d);
  while (accumAngle >= DEG_PER_ITEM)  { moveCursor(1);  accumAngle -= DEG_PER_ITEM; tickFeedback(); }
  while (accumAngle <= -DEG_PER_ITEM) { moveCursor(-1); accumAngle += DEG_PER_ITEM; tickFeedback(); }
});
function endDrag() {
  if (!dragging) return;
  dragging = false;
  wheel.classList.remove('dragging');
  accumAngle = 0;
}
wheel.addEventListener('pointerup', endDrag);
wheel.addEventListener('pointercancel', endDrag);
wheel.addEventListener('wheel', (e) => {
  e.preventDefault();
  ensureAudio();
  moveCursor(e.deltaY > 0 ? 1 : -1);
  tickFeedback();
}, { passive: false });

// ====== 버튼 ======
document.getElementById('btnMenu').addEventListener('click', () => {
  if (document.getElementById('dlModal').classList.contains('show')) return closeDownload();
  if (state.view === 'options')   goRows(state.currentTabIdx, 'backward');
  else if (state.view === 'rows') goTabs();
  else if (state.view === 'tabs') showStart();
});

document.getElementById('centerBtn').addEventListener('click', () => {
  ensureAudio();
  if (state.view === 'tabs')         goRows(state.rowCursor);
  else if (state.view === 'rows')    goOptions(state.rowCursor);
  else if (state.view === 'options') selectOption();
});

document.getElementById('btnPrev').addEventListener('click', () => { moveCursor(-1); tickFeedback(); });
document.getElementById('btnNext').addEventListener('click', () => { moveCursor(1);  tickFeedback(); });
document.getElementById('btnPlay').addEventListener('click', () => {
  document.getElementById('centerBtn').click();
});

document.getElementById('btnSave').addEventListener('click', () => {
  if (!workbook) return;
  saveLocal();
  dirty = false;
  updateDirty();
  toast('저장됨');
});
document.getElementById('btnExport').addEventListener('click', buildAndExport);

// 파일 인풋 위임
document.addEventListener('change', (e) => {
  if (e.target?.id === 'openFile') onFileOpen(e);
});
// 키보드
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown')  { moveCursor(1);  tickFeedback(); }
  else if (e.key === 'ArrowUp') { moveCursor(-1); tickFeedback(); }
  else if (e.key === 'Enter') document.getElementById('centerBtn').click();
  else if (e.key === 'Escape' || e.key === 'Backspace') document.getElementById('btnMenu').click();
  else if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); document.getElementById('btnSave').click(); }
  else if ((e.ctrlKey || e.metaKey) && e.key === 'e') { e.preventDefault(); buildAndExport(); }
});

window.addEventListener('beforeunload', (e) => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

start();
</script>
